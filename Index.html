                    { q: "Mass extinctions have occurred how many times in Earth's history?", choices: ["Once (asteroid impact only)", "Two times", "Five major extinctions", "Hundreds of times"], ans: 2, exp: "There have been five major mass extinction events in Earth's history: the Ordovician-Silurian, Late Devonian, Permian-Triassic (largest, ~96% species lost), Triassic-Jurassic, and Cretaceous-Paleogene (dinosaur extinction)." },
                    { q: "Radiometric dating measures the age of fossils and rocks using:", choices: ["The depth at which fossils are found", "The decay rate of radioactive isotopes", "The color and texture of rock layers", "The hardness of minerals"], ans: 1, exp: "Radiometric dating measures the ratio of parent to daughter isotopes of a radioactive element in a sample. Since radioactive decay occurs at a known constant rate (half-life), the ratio allows calculation of absolute age." },
                    { q: "The term 'evolution' in biology refers to:", choices: ["Individual organisms changing during their lifetime", "Change in allele frequencies in a population over generations", "The origin of the universe", "Survival of the fittest individual"], ans: 1, exp: "Biological evolution is defined as change in allele frequencies in a population over time (generations). It is a population-level process, not a change within an individual organism's lifetime." },
                    { q: "Darwin and Wallace are jointly credited with proposing the mechanism of:", choices: ["Genetic drift", "Punctuated equilibrium", "Natural selection", "Mutationism"], ans: 2, exp: "Charles Darwin and Alfred Russel Wallace independently developed the theory of evolution by natural selection, both presented to the Linnean Society in 1858. Darwin published 'On the Origin of Species' in 1859." },
                    { q: "Lamarck's theory of evolution differed from Darwin's in that Lamarck proposed:", choices: ["Natural selection", "Random mutation", "Inheritance of acquired characteristics (use and disuse)", "Genetic drift"], ans: 2, exp: "Lamarck proposed that organisms could pass on traits acquired during their lifetime (e.g., a giraffe stretching its neck making it longer, then passing that longer neck to offspring). This is now known to be incorrect." },
                    { q: "The modern synthesis of evolutionary theory combines Darwinian natural selection with:", choices: ["Lamarckian inheritance", "Mendel's genetics and population genetics", "Creationist principles", "Epigenetics only"], ans: 1, exp: "The Modern Evolutionary Synthesis (1930s–1940s) united Darwin's natural selection with Mendelian genetics and population genetics (Hardy-Weinberg), incorporating mutation, gene flow, genetic drift, and selection as evolutionary mechanisms." },
                    { q: "Hardy-Weinberg equilibrium describes a population that is:", choices: ["Actively evolving", "Not evolving — allele frequencies remain constant", "Undergoing genetic drift", "Experiencing natural selection"], ans: 1, exp: "Hardy-Weinberg equilibrium describes an idealized non-evolving population where allele frequencies remain constant. It requires: no mutation, no gene flow, random mating, large population size, and no natural selection." },
                    { q: "Genetic drift has the GREATEST effect on:", choices: ["Large, stable populations", "Small populations where random chance can greatly alter allele frequencies", "Populations with strong natural selection", "Populations with unlimited food supply"], ans: 1, exp: "Genetic drift — random changes in allele frequencies due to chance — has the greatest impact in small populations, where sampling error is proportionally larger. It can cause alleles to be fixed or lost by chance alone." },
                    { q: "The founder effect is a form of genetic drift that occurs when:", choices: ["A large population invades new territory", "A small group establishes a new population, carrying limited genetic variation", "Environmental selection kills many individuals", "Gene flow stops between two large populations"], ans: 1, exp: "The founder effect occurs when a small subset of individuals ('founders') colonizes a new area, establishing a new population with reduced genetic diversity compared to the original population. Can lead to inbreeding and high frequency of certain alleles." },
                    { q: "Natural selection acts on which level of biological organization?", choices: ["DNA sequence directly", "Individual phenotype (not genotype)", "Population gene frequencies", "Ecosystem structure"], ans: 1, exp: "Natural selection acts on phenotype — the physical expression of genes. Individuals with phenotypes better suited to the environment survive and reproduce more, and if those phenotypes have a genetic basis, allele frequencies change over generations." },
                    { q: "Darwin visited which archipelago that provided key observations for his theory of natural selection?", choices: ["Hawaiian Islands", "The Galápagos Islands", "The Canary Islands", "The Maldives"], ans: 1, exp: "Darwin's visit to the Galápagos Islands during the Beagle voyage (1835) was transformative. He observed closely related species on different islands (especially finches and tortoises) with distinct adaptations, suggesting common ancestry with divergence." },
                    // EVIDENCE OF EVOLUTION (21-35)
                    { q: "Homologous structures provide evidence for evolution because they:", choices: ["Have the same function in different species", "Have a common ancestral origin but may have different functions in different species", "Are found only in closely related species", "Always look identical"], ans: 1, exp: "Homologous structures share the same basic anatomy and embryological origin due to descent from a common ancestor, even if current function differs (e.g., human arm, whale flipper, bat wing, horse leg — all homologous forelimbs)." },
                    { q: "Analogous structures are similar in function but:", choices: ["Have the same embryological origin", "Evolved independently in unrelated lineages (convergent evolution) and have different origins", "Always have the same genetic basis", "Show common ancestry"], ans: 1, exp: "Analogous structures evolved independently through convergent evolution to perform similar functions but have different developmental origins and genetic basis (e.g., wings of insects vs. birds, eyes of octopuses vs. humans)." },
                    { q: "Vestigial structures are best explained by:", choices: ["Special creation", "Inheritance from ancestors who used the structure, now reduced due to disuse", "Active use in modern organisms", "Convergent evolution"], ans: 1, exp: "Vestigial structures are reduced, non-functional (or minimally functional) remnants of structures that served important functions in ancestors. Examples: human appendix, coccyx (tailbone), whale pelvis, cave fish eyes." },
                    { q: "Comparative embryology supports evolution because:", choices: ["All animals look identical as adults", "Distantly related animals show striking similarity in early embryonic stages, suggesting common ancestry", "Embryos never resemble other species", "Only mammal embryos look similar"], ans: 1, exp: "Vertebrate embryos of fish, birds, reptiles, and mammals look remarkably similar in early stages (e.g., all have pharyngeal arches and a post-anal tail), indicating that developmental genetic programs are conserved from common ancestors." },
                    { q: "Biogeography supports evolution by showing that:", choices: ["Organisms are distributed randomly across Earth", "Related species tend to be found in the same geographic region because they evolved from common ancestors there", "All continents have identical species", "Species do not move or change location"], ans: 1, exp: "Biogeography — the study of geographic distribution of species — provides strong evolutionary evidence: closely related species tend to occur in the same geographic region, and isolated areas (islands, continents) evolve unique species from founding populations." },
                    { q: "The molecular evidence for evolution includes:", choices: ["Fossil record observations", "Similarity in DNA and protein sequences among related organisms", "Anatomical comparisons only", "Behavioral similarities"], ans: 1, exp: "Molecular evidence — similarities in DNA sequences, protein amino acid sequences, and genetic code — shows that all life shares common ancestry. More closely related species have more similar molecular sequences (molecular phylogeny)." },
                    { q: "Industrial melanism in peppered moths (Biston betularia) demonstrates:", choices: ["Random genetic drift", "Natural selection in action — dark moths increased in polluted industrial environments", "Lamarckian inheritance", "Gene flow from other moth species"], ans: 1, exp: "Before industrialization, light-colored moths were camouflaged on light-colored lichen-covered trees; dark moths were visible and eaten by predators. Pollution killed lichens and darkened trees, making dark moths better camouflaged and light moths more visible — a real-time demonstration of natural selection." },
                    { q: "Antibiotic resistance in bacteria is an example of:", choices: ["Intelligent adaptation by bacteria", "Natural selection — resistant bacteria survive and reproduce when antibiotics are applied", "Bacteria acquiring resistance through learning", "Lamarckian evolution"], ans: 1, exp: "When antibiotics are applied, bacteria with pre-existing resistance mutations (randomly occurring) survive and reproduce, passing resistance genes to offspring. This is natural selection, not directed evolution — resistance existed before antibiotic exposure." },
                    { q: "The fossil record supports evolution by:", choices: ["Showing fully formed modern species in ancient rocks", "Documenting a progression from simpler, older organisms to more complex, newer organisms over time", "Being completely random in what it preserves", "Showing no transitional forms"], ans: 1, exp: "The fossil record documents the history of life on Earth, showing extinct organisms, progression of forms over time, transitional fossils (e.g., Tiktaalik, Archaeopteryx), and biostratigraphic patterns consistent with evolution." },
                    { q: "Tiktaalik is a transitional fossil that shows characteristics of both:", choices: ["Fish and dinosaurs", "Fish and early tetrapods (limbed vertebrates) — a 'fishapod'", "Birds and reptiles", "Mammals and amphibians"], ans: 1, exp: "Tiktaalik (~375 million years ago) was a lobe-finned fish with fish-like scales but also proto-limb features: a neck, ribs, and fins with wrist-like bones supporting weight — a key transitional form documenting the fish-to-tetrapod transition." },
                    { q: "Which pattern of evolution involves two species evolving in response to each other?", choices: ["Divergent evolution", "Convergent evolution", "Coevolution", "Parallel evolution"], ans: 2, exp: "Coevolution occurs when two species exert selective pressure on each other, evolving in tandem. Classic examples: flowers and their pollinators, predators and prey, parasites and hosts, and plants and herbivores developing defenses and counter-defenses." },
                    { q: "Allopatric speciation occurs when:", choices: ["Two populations evolve in the same geographic area", "A geographic barrier physically separates populations, allowing independent evolution", "Gene flow increases between populations", "Polyploidy doubles chromosome numbers"], ans: 1, exp: "Allopatric (geographic) speciation occurs when a physical barrier (mountain range, ocean, canyon) separates a population into two or more isolated groups that independently accumulate genetic differences until they become reproductively isolated." },
                    { q: "Sympatric speciation occurs:", choices: ["Only in plant species", "When speciation occurs within the same geographic area without physical isolation", "Only in island populations", "Always through polyploidy"], ans: 1, exp: "Sympatric speciation occurs when new species arise within the same geographic area, without physical separation. Mechanisms include polyploidy (especially in plants), habitat or host specialization, sexual selection, and disruptive selection." },
                    { q: "Punctuated equilibrium proposes that evolution:", choices: ["Occurs at a perfectly constant rate", "Is characterized by long periods of relative stasis punctuated by rapid bursts of change", "Only occurs through gradualism", "Never produces new species"], ans: 1, exp: "Punctuated equilibrium (Gould & Eldredge, 1972) proposes that species remain relatively unchanged for long periods (stasis) and speciation events are relatively rapid and concentrated — contrasting with phyletic gradualism." },
                    { q: "Phyletic gradualism proposes that evolution:", choices: ["Occurs in sudden jumps", "Proceeds slowly and continuously through accumulated small changes over long time periods", "Does not leave a fossil record", "Requires geographic barriers"], ans: 1, exp: "Phyletic gradualism, the classical view, proposes that evolutionary change is slow, gradual, and continuous over geological time — essentially the original Darwinian view of evolution as accumulation of small variations." },
                    // NATURAL SELECTION PATTERNS (36-60)
                    { q: "Stabilizing selection favors:", choices: ["Extreme phenotypes", "The intermediate phenotype, reducing variation", "One extreme phenotype over the other", "Equal representation of all phenotypes"], ans: 1, exp: "Stabilizing selection acts against extreme phenotypes at both ends, favoring the intermediate. It reduces population variation and maintains the current phenotypic optimum. Example: human birth weight — very small and very large babies have higher mortality." },
                    { q: "Directional selection favors:", choices: ["The intermediate phenotype", "Both extreme phenotypes equally", "One extreme phenotype, shifting the population mean in that direction", "No phenotype in particular"], ans: 2, exp: "Directional selection shifts the population phenotype toward one extreme. Example: larger beak size in Darwin's finches during drought (when only large hard seeds are available), or antibiotic resistance over time." },
                    { q: "Disruptive (diversifying) selection favors:", choices: ["The average phenotype", "Both extreme phenotypes over the intermediate, potentially splitting populations", "The rarest phenotype", "Only the smallest individuals"], ans: 1, exp: "Disruptive selection favors both extremes of the phenotypic distribution over the intermediate, increasing variation in the population and potentially leading to sympatric speciation if the two extremes become reproductively isolated." },
                    { q: "Sexual selection is a type of natural selection in which:", choices: ["Only females are selected for", "Traits that increase mating success are favored, even if they reduce survival", "Random mating occurs", "Selection only acts on juveniles"], ans: 1, exp: "Sexual selection occurs when traits increase an individual's success in acquiring mates, even at the cost of survival (e.g., peacock's tail — costly to carry but attracts females). It includes intersexual (mate choice) and intrasexual (competition) selection." },
                    { q: "The concept of inclusive fitness explains:", choices: ["Why organisms always sacrifice themselves for unrelated individuals", "Why individuals help relatives, because shared genes are propagated through kin", "Why males are always larger than females", "Why parasites never help hosts"], ans: 1, exp: "Inclusive fitness (Hamilton's rule) explains altruism toward relatives — since kin share genes, helping relatives survive and reproduce propagates copies of the helper's own genes. The benefit × relatedness must exceed the cost to the helper." },
                    { q: "Gene flow between populations has what effect on evolution?", choices: ["It always increases genetic diversity in all populations", "It homogenizes allele frequencies between populations, reducing differentiation", "It causes random fixation of alleles", "It prevents adaptation"], ans: 1, exp: "Gene flow (migration of individuals carrying alleles between populations) tends to homogenize allele frequencies between populations, reducing genetic differentiation. High gene flow inhibits local adaptation; low gene flow allows divergence." },
                    { q: "The bottleneck effect is a form of genetic drift caused by:", choices: ["A sudden dramatic reduction in population size due to a random catastrophic event", "Selective pressure from predators", "Increased mutation rate", "Immigration of new individuals"], ans: 0, exp: "The bottleneck effect occurs when a population is drastically reduced by a catastrophic event (earthquake, disease, hunting), leaving a small random sample. The survivor gene pool may not represent the original population's allele frequencies." },
                    { q: "Which of the following is NOT one of Darwin's four postulates for natural selection?", choices: ["Variation exists among individuals in a population", "Variation is heritable", "All individuals reproduce equally regardless of their traits", "Differential reproductive success occurs based on traits"], ans: 2, exp: "Darwin's four postulates: (1) variation exists, (2) variation is heritable, (3) more offspring are produced than can survive, and (4) survival and reproduction are non-random (individuals with favorable traits are more likely to survive and reproduce)." },
                    { q: "Relative fitness in evolutionary biology is measured by:", choices: ["Size of an organism", "Strength of an organism", "Number of fertile offspring contributed to the next generation relative to others", "Longevity of the organism"], ans: 2, exp: "Relative fitness is the reproductive success of a genotype relative to others in the population — specifically the number of fertile offspring that survive to reproduce. Fitness = 1 means average; >1 means above-average reproductive success." },
                    { q: "Coevolutionary arms races between predators and prey best illustrate:", choices: ["Genetic drift", "Directional selection pressure on both species driving mutual adaptation", "Founder effect", "Stabilizing selection in both species"], ans: 1, exp: "Predator-prey arms races involve reciprocal directional selection: prey evolve better defenses (speed, camouflage, toxins), which selects for better predator attack abilities, which selects for better prey defenses — a continuous cycle of mutual adaptation." },
                ]
            },
            {
                id: 'u5', label: 'Unit 5', color: 'var(--unit5)',
                title: "Making Sense of Our Biological World",
                desc: "Classification, taxonomy, systematics, phylogeny, domains, and diversity of life",
                questions: [
                    // CLASSIFICATION HISTORY & BINOMIAL (1-15)
                    { q: "Aristotle's early classification system divided organisms into:", choices: ["Five kingdoms", "Animals and plants, with animals grouped by habitat", "Prokaryotes and eukaryotes", "Producers and consumers"], ans: 1, exp: "Aristotle (~350 BCE) classified organisms into plants and animals, further dividing animals by habitat (air, land, water) and blood vs. bloodless — the first systematic attempt at biological classification." },
                    { q: "Carolus Linnaeus is credited with developing:", choices: ["The theory of evolution", "The binomial nomenclature system for naming species", "The cell theory", "The concept of natural selection"], ans: 1, exp: "Carl Linnaeus (18th century) systematized biological classification and developed binomial nomenclature — the two-part Latin naming system (genus + species) still used today, published in 'Systema Naturae.'" },
                    { q: "In binomial nomenclature, the scientific name of a species consists of:", choices: ["Family name and order", "Genus name and specific epithet (species name)", "Kingdom and phylum", "Domain and kingdom"], ans: 1, exp: "Binomial nomenclature gives each species a two-part Latin name: the genus name (capitalized) + the specific epithet (lowercase). Together they form the species name, e.g., Homo sapiens (genus Homo, species sapiens)." },
                    { q: "Scientific names are written in:", choices: ["English only", "Latin or Greek, italicized, with genus capitalized and species lowercase", "All capital letters", "The scientist's native language"], ans: 1, exp: "By international convention, scientific names are written in Latin or Latinized Greek, italicized (or underlined in handwriting), with the genus capitalized and the specific epithet in lowercase: e.g., Panthera leo." },
                    { q: "Which of the following is the correct format for a scientific name?", choices: ["homo sapiens", "Homo Sapiens", "Homo sapiens", "HOMO SAPIENS"], ans: 2, exp: "The correct format italicizes the name, capitalizes only the genus, and uses lowercase for the specific epithet: Homo sapiens. When handwritten, the name should be underlined instead of italicized." },
                    { q: "The advantage of scientific (Latin) names over common names is that:", choices: ["They are easier for the public to understand", "They are universal — the same name applies worldwide regardless of language", "They change with each generation", "Common names are more accurate scientifically"], ans: 1, exp: "Scientific names are internationally standardized — every scientist globally uses the same name for a given species, eliminating confusion caused by different regional common names (e.g., 'mountain lion,' 'puma,' and 'cougar' all refer to Puma concolor)." },
                    { q: "The smallest and most specific taxonomic category is:", choices: ["Kingdom", "Phylum", "Genus", "Species"], ans: 3, exp: "In the Linnaean hierarchy (Domain > Kingdom > Phylum > Class > Order > Family > Genus > Species), species is the most specific and narrowest category, defining organisms that can interbreed and produce fertile offspring." },
                    { q: "Which taxonomic level includes the most diverse collection of organisms?", choices: ["Species", "Genus", "Family", "Kingdom"], ans: 3, exp: "Kingdom (and Domain above it) is the broadest, most inclusive taxonomic level, encompassing enormous diversity. Domain is even broader than kingdom in modern classification." },
                    { q: "The mnemonic 'Dear King Philip Came Over For Good Soup' represents:", choices: ["The evolutionary tree of life", "The hierarchical levels of taxonomy: Domain, Kingdom, Phylum, Class, Order, Family, Genus, Species", "Biochemical pathways", "The layers of ecosystems"], ans: 1, exp: "Common mnemonic for the taxonomic hierarchy (from broadest to most specific): Domain, Kingdom, Phylum, Class, Order, Family, Genus, Species. Other versions: 'Dumb Kids Playing Chess On Freeways Get Squished.'" },
                    { q: "Which domain includes organisms with membrane-bound nuclei?", choices: ["Bacteria", "Archaea", "Eukarya", "None — no domain requires nuclei"], ans: 2, exp: "Domain Eukarya includes all organisms with membrane-bound nuclei and membrane-bound organelles. It includes Kingdoms Protista, Fungi, Plantae, and Animalia." },
                    { q: "The three-domain system proposed by Carl Woese classifies life into:", choices: ["Prokaryotes, Eukaryotes, and Viruses", "Bacteria, Archaea, and Eukarya", "Plants, Animals, and Microbes", "Producers, Consumers, and Decomposers"], ans: 1, exp: "Carl Woese's three-domain system (based on 16S rRNA sequencing, 1977) replaces the two-kingdom prokaryote/eukaryote system. The three domains are Bacteria, Archaea, and Eukarya — Archaea are more closely related to Eukarya than to Bacteria." },
                    { q: "Archaea differ from Bacteria in that Archaea:", choices: ["Have a nucleus", "Have a cell wall made of peptidoglycan", "Have unique membrane lipids with ether linkages and live in extreme environments (many)", "Are larger cells"], ans: 2, exp: "Archaea have unique biochemical features: ether-linked membrane lipids (rather than ester-linked in bacteria and eukaryotes), distinctive ribosomal RNA sequences, and no peptidoglycan in cell walls. Many are extremophiles (thermophiles, halophiles, methanogens)." },
                    { q: "Taxonomy is the scientific discipline of:", choices: ["Studying ancient organisms through fossils", "Classifying, naming, and organizing organisms into groups", "Studying the behavior of animals", "Analyzing DNA sequences"], ans: 1, exp: "Taxonomy is the branch of biology concerned with naming, describing, and classifying organisms, using principles that reflect evolutionary relationships. It provides the universal language for referring to organisms." },
                    { q: "The biological species concept defines a species as a group of:", choices: ["Organisms that look identical", "Organisms that can interbreed and produce fertile offspring, and are reproductively isolated from others", "Organisms sharing the same genetic code", "All organisms in the same genus"], ans: 1, exp: "Ernst Mayr's biological species concept defines a species as a population or group of populations whose members can potentially interbreed and produce fertile offspring, but are reproductively isolated from members of other species." },
                    { q: "Which of the following correctly lists taxonomic levels from broadest to most specific?", choices: ["Species → Genus → Family → Order → Class → Phylum → Kingdom → Domain", "Domain → Kingdom → Phylum → Class → Order → Family → Genus → Species", "Genus → Species → Family → Order → Class → Phylum → Kingdom", "Kingdom → Domain → Phylum → Class"], ans: 1, exp: "The correct hierarchy from broadest to most specific is: Domain → Kingdom → Phylum → Class → Order → Family → Genus → Species. Each level becomes progressively more exclusive and specific." },
                    // SYSTEMATICS & MOLECULAR PHYLOGENY (16-30)
                    { q: "Systematics is the scientific study of:", choices: ["Ecosystems", "The diversity of organisms and their evolutionary relationships", "Individual behavior", "Physiological processes"], ans: 1, exp: "Systematics is the study of biological diversity and evolutionary relationships among organisms. It encompasses taxonomy (naming and classifying) but also reconstructing phylogenies (evolutionary trees) to understand how species are related." },
                    { q: "A phylogenetic tree (cladogram) represents:", choices: ["The age of organisms", "Evolutionary relationships and ancestry among species", "Geographic distribution only", "Similarities in behavior"], ans: 1, exp: "A phylogenetic tree (or cladogram) is a branching diagram showing the inferred evolutionary relationships among species or other taxa based on shared derived characters (synapomorphies) or molecular data." },
                    { q: "Cladistics classifies organisms based on:", choices: ["Overall similarity", "Shared derived characters (synapomorphies) that evolved from a common ancestor", "Ecological roles", "Traditional Linnaean hierarchies only"], ans: 1, exp: "Cladistics (phylogenetic systematics) classifies organisms based on shared derived characters (synapomorphies) — traits that evolved in a common ancestor and were inherited by all its descendants, forming clades (monophyletic groups)." },
                    { q: "A clade (monophyletic group) includes:", choices: ["Any group of similar organisms", "An ancestor and ALL of its descendants", "Selected descendants of an ancestor", "Only currently living organisms"], ans: 1, exp: "A clade (monophyletic group) consists of an ancestor and all of its descendants — a complete branch of the tree of life. It is the fundamental unit in cladistics. Paraphyletic groups exclude some descendants; polyphyletic groups lack the common ancestor." },
                    { q: "Molecular phylogeny primarily uses which type of data to reconstruct evolutionary trees?", choices: ["Fossil records", "DNA, RNA, and protein sequences compared across species", "Morphological features only", "Behavioral similarities"], ans: 1, exp: "Molecular phylogeny reconstructs evolutionary relationships by comparing DNA, RNA, or protein sequences. More similar sequences indicate closer evolutionary relationship; divergence time can be estimated using molecular clock calculations." },
                    { q: "The molecular clock hypothesis states that:", choices: ["Evolution occurs faster in warm climates", "DNA mutations accumulate at a roughly constant rate over time, allowing estimation of divergence times", "All organisms evolve at the same rate", "Molecular data cannot be used to date evolutionary events"], ans: 1, exp: "The molecular clock hypothesis proposes that DNA mutations accumulate at a roughly constant average rate. By comparing sequence differences between species and calibrating with fossil dates, scientists can estimate when two lineages diverged." },
                    { q: "Convergent evolution produces structures that are:", choices: ["Homologous — sharing common ancestry", "Analogous — similar in function but evolved independently in unrelated lineages", "Identical at the molecular level", "Derived from the same embryological tissue"], ans: 1, exp: "Convergent evolution produces analogous structures — similar in function and sometimes appearance but evolved independently in distantly related organisms with different genetic and developmental origins (e.g., wings of insects, birds, and bats)." },
                    { q: "Which molecule is most commonly used in molecular phylogenetics to determine relationships among bacteria?", choices: ["Messenger RNA", "16S ribosomal RNA (rRNA)", "Transfer RNA", "Mitochondrial DNA"], ans: 1, exp: "16S rRNA is the 'workhorse' of bacterial phylogenetics — it is universal (present in all bacteria), functionally conserved (so it isn't lost), evolves slowly enough to compare distantly related groups, and has been sequenced in thousands of species." },
                    { q: "The term 'outgroup' in phylogenetic analysis refers to:", choices: ["The most recently evolved taxon", "A taxon that is related to but outside the group being studied, used to root the tree", "The largest group on the tree", "Extinct species only"], ans: 1, exp: "An outgroup is a taxon known to be more distantly related to all members of the ingroup. It is used to root the phylogenetic tree (establish the ancestral node) and determine which characters are derived vs. ancestral." },
                    { q: "Horizontal (lateral) gene transfer complicates phylogenetics because:", choices: ["It slows mutation rates", "Genes can move between organisms that are not parent-offspring, obscuring vertical evolutionary history", "It prevents speciation", "All genes transfer horizontally"], ans: 1, exp: "Horizontal gene transfer (HGT) — especially common in bacteria — moves genes between non-related organisms (via plasmids, transformation, transduction). This creates a 'web of life' rather than a strict tree, complicating reconstruction of evolutionary history." },
                    { q: "Mitochondrial DNA (mtDNA) is often used in phylogenetics because it:", choices: ["Is found in all cells including prokaryotes", "Is maternally inherited, evolves rapidly, and has many copies per cell making it easy to obtain", "Is nuclear DNA", "Changes at a constant rate universally"], ans: 1, exp: "mtDNA is widely used in population genetics and phylogenetics: it has maternal inheritance (clonal, no recombination), high copy number, faster mutation rate than nuclear DNA, and well-characterized structure and gene content." },
                    { q: "What does the term 'paraphyletic group' mean in cladistics?", choices: ["Includes an ancestor and all descendants", "Includes an ancestor and some but not all of its descendants", "Has no common ancestor", "Includes species from multiple unrelated lineages"], ans: 1, exp: "A paraphyletic group includes an ancestor and some, but not all, of its descendants. Example: 'Reptilia' in traditional classification excluded birds, even though birds evolved from reptilian ancestors — making it paraphyletic (not a valid clade)." },
                    { q: "Parsimony in phylogenetics means choosing the evolutionary tree that:", choices: ["Has the most branches", "Requires the fewest evolutionary changes to explain observed data", "Is most compatible with fossil evidence", "Has the most extinct species"], ans: 1, exp: "The principle of parsimony (Occam's razor) in phylogenetics favors the tree requiring the fewest evolutionary changes (character state transformations) to explain the observed distribution of traits — the simplest adequate explanation." },
                    { q: "Which of the following represents the correct classification of humans to kingdom?", choices: ["Protista", "Fungi", "Plantae", "Animalia"], ans: 3, exp: "Humans (Homo sapiens) belong to Kingdom Animalia — multicellular, eukaryotic, heterotrophic organisms that typically reproduce sexually and lack cell walls." },
                    { q: "Horizontal gene transfer between domains of life is most commonly observed through:", choices: ["Sexual reproduction", "Viral or plasmid-mediated transfer, especially in prokaryotes", "Normal meiosis", "Mitotic cell division"], ans: 1, exp: "HGT between domains occurs primarily through viruses (transduction), plasmid exchange (conjugation), and environmental DNA uptake (transformation) — mechanisms that can even move genes between bacteria and occasionally to eukaryotic genomes." },
                    // DIVERSITY OF LIFE (31-60)
                    { q: "Viruses are classified as:", choices: ["Prokaryotes", "Eukaryotes", "Living organisms in Domain Bacteria", "Not living organisms; they are acellular infectious agents"], ans: 3, exp: "Viruses are acellular (non-cellular) entities consisting of nucleic acid (DNA or RNA) enclosed in a protein coat (capsid). They are not considered living organisms because they cannot carry out metabolism or reproduce independently." },
                    { q: "Bacteria reproduce primarily through:", choices: ["Meiosis", "Mitosis", "Binary fission", "Budding"], ans: 2, exp: "Bacteria reproduce asexually through binary fission — a cell grows to approximately double its size, replicates its circular chromosome, and divides into two genetically identical daughter cells. It is rapid and simple." },
                    { q: "Prokaryotes that thrive in extreme environments (hot springs, salt lakes, methane habitats) are classified as:", choices: ["Bacteria", "Archaea", "Protists", "Extremophilic Fungi"], ans: 1, exp: "Archaea are famous for their ability to thrive in extreme environments: thermophiles (hot springs, volcanic vents), halophiles (salt lakes), acidophiles (acid mine drainage), and methanogens (swamp sediments, animal guts)." },
                    { q: "Protists are characterized as:", choices: ["Multicellular eukaryotes that photosynthesize", "Mostly unicellular eukaryotes that don't fit neatly into other kingdoms", "Prokaryotes with complex structures", "Fungi that live in water"], ans: 1, exp: "Kingdom Protista (or Domain Eukarya, informal group) includes mostly unicellular eukaryotes (plus some simple multicellular forms) that don't fit into the plant, animal, or fungi kingdoms. They are extraordinarily diverse: algae, amoebas, paramecia, slime molds, etc." },
                    { q: "Fungi are distinguished from plants because fungi:", choices: ["Have cell walls", "Are autotrophs that photosynthesize", "Are heterotrophs that absorb nutrients through digestion outside the cell body (extracellular digestion)", "Are all unicellular"], ans: 2, exp: "Fungi are heterotrophic — they secrete digestive enzymes into their environment (extracellular digestion) and absorb the resulting nutrients. Unlike plants, fungi cannot photosynthesize. Their cell walls are made of chitin, not cellulose." },
                    { q: "Mycorrhizal fungi form mutualistic associations with:", choices: ["Animal intestines", "Plant roots, enhancing nutrient and water absorption", "Parasites", "Bacteria only"], ans: 1, exp: "Mycorrhizae are mutualistic symbioses between fungi and plant roots. The fungal mycelium dramatically increases the root's surface area for water and mineral (especially phosphorus) absorption; the plant provides the fungus with photosynthetically produced sugars." },
                    { q: "Lichens are symbiotic associations between:", choices: ["A plant and a bacterium", "A fungus and a photosynthetic partner (cyanobacteria or green algae)", "Two species of fungi", "An alga and an animal"], ans: 1, exp: "Lichens are composite organisms formed from a mutualistic (or perhaps controlled parasitic) relationship between a fungus (usually ascomycete) and a photosynthetic partner — either cyanobacteria (procaryote) or green algae (eukaryote)." },
                    { q: "Bryophytes (mosses, liverworts, hornworts) are characterized by:", choices: ["Having vascular tissue and seeds", "Lacking vascular tissue (non-vascular) and depending on water for reproduction", "Being unicellular aquatic organisms", "Having flowers and fruits"], ans: 1, exp: "Bryophytes are the most primitive land plants: they lack vascular tissue (xylem/phloem) for water and nutrient transport, are anchored by rhizoids (not true roots), and require water for fertilization (flagellated sperm must swim to eggs)." },
                    { q: "Vascular plants differ from bryophytes in that vascular plants have:", choices: ["No roots or stems", "Xylem and phloem for water and nutrient transport", "Only asexual reproduction", "No leaves"], ans: 1, exp: "Vascular plants (tracheophytes) possess specialized conducting tissues: xylem (water and mineral transport from roots upward) and phloem (sugar transport from leaves to other tissues). This allows growth to larger sizes than non-vascular plants." },
                    { q: "Angiosperms are the most successful group of land plants because they:", choices: ["Produce naked seeds", "Lack flowers", "Produce flowers and enclosed seeds within fruits, enabling diverse pollination and dispersal strategies", "Are always evergreen"], ans: 2, exp: "Angiosperms' evolutionary success stems from their flowers (enabling diverse, efficient pollination strategies) and fruits (enabling diverse seed dispersal strategies). With ~300,000+ species, they dominate most terrestrial ecosystems." },
                    { q: "Which animal phylum is characterized by a segmented body, jointed legs, and an exoskeleton?", choices: ["Mollusca", "Echinodermata", "Arthropoda", "Annelida"], ans: 2, exp: "Phylum Arthropoda (insects, crustaceans, arachnids, millipedes) is defined by: segmented bodies, jointed appendages, and a chitinous exoskeleton. It is the most species-rich animal phylum, comprising ~75% of all animal species." },
                    { q: "Echinoderms (sea stars, sea urchins) are unique among animals in having:", choices: ["A backbone", "Pentaradial (five-part) symmetry and a water vascular system", "Three-part body plan", "Exoskeleton"], ans: 1, exp: "Echinoderms are unique in their pentaradial (five-fold) symmetry as adults (though bilaterally symmetrical as larvae) and their water vascular system — hydraulic tube feet used for locomotion, feeding, gas exchange, and sensory reception." },
                    { q: "Chordates are defined by having, at some point in their development:", choices: ["Exoskeleton and jointed legs", "Notochord, dorsal hollow nerve cord, pharyngeal slits, and post-anal tail", "Radial symmetry and water vascular system", "Segmented body with setae"], ans: 1, exp: "All chordates share four key features during at least some stage of development: (1) notochord (flexible skeletal rod), (2) dorsal hollow nerve cord, (3) pharyngeal (gill) slits or pouches, and (4) post-anal muscular tail." },
                    { q: "The notochord in vertebrate embryos is eventually replaced by the:", choices: ["Brain", "Vertebral column (backbone)", "Ribs", "Skull"], ans: 1, exp: "The notochord (the defining chordate structure) is present in all vertebrate embryos but is largely replaced by the vertebral column during development. Remnants persist in adult vertebrates as the nucleus pulposus of intervertebral discs." },
                    { q: "Which kingdom includes organisms such as mushrooms, yeasts, and molds?", choices: ["Plantae", "Animalia", "Fungi", "Protista"], ans: 2, exp: "Kingdom Fungi includes multicellular organisms (mushrooms, molds) and unicellular forms (yeasts). All are heterotrophic absorbers with cell walls of chitin. They are more closely related to animals than to plants!" },
                    { q: "The phylogenetic tree of life, based on molecular data, shows that the closest relatives of Archaea are:", choices: ["Bacteria", "Protists", "Domain Eukarya — Archaea and Eukarya share a common ancestor more recent than with Bacteria", "Fungi"], ans: 2, exp: "Molecular phylogenetics (rRNA and genome data) consistently shows that Archaea and Eukarya form a sister group (sharing a more recent common ancestor), collectively called Neomura — making Archaea more closely related to us than to bacteria." },
                    { q: "In the five-kingdom system, the kingdom Monera consisted of:", choices: ["Eukaryotes only", "All prokaryotes (bacteria)", "Fungi and bacteria", "Viruses and bacteria"], ans: 1, exp: "In Whittaker's five-kingdom system (1969), Kingdom Monera contained all prokaryotes. Molecular evidence later revealed the fundamental division between Bacteria and Archaea, leading Woese to propose the three-domain system." },
                    { q: "Stromatolites are important in evolutionary biology because they are:", choices: ["The oldest animal fossils", "Layered microbial mats (fossilized) providing evidence of some of the earliest life on Earth", "Extinct forms of fungi", "Intermediate forms between plants and animals"], ans: 1, exp: "Stromatolites are laminated rock structures formed by cyanobacterial mats. Fossil stromatolites ~3.5 billion years old provide our earliest evidence of life on Earth. Living stromatolites still exist in Shark Bay, Australia." },
                    { q: "The endosymbiotic theory proposes that mitochondria and chloroplasts evolved from:", choices: ["Infoldings of the plasma membrane", "Free-living prokaryotes that were engulfed by ancestral eukaryotic cells", "Viruses that infected early cells", "Nuclear fragments"], ans: 1, exp: "Lynn Margulis's endosymbiotic theory (1967) proposes that mitochondria evolved from engulfed alpha-proteobacteria, and chloroplasts from engulfed cyanobacteria — supported by their double membranes, own circular DNA, and 70S ribosomes." },
                    { q: "Which of the following is a characteristic shared by ALL living things?", choices: ["Presence of a cell nucleus", "Ability to photosynthesize", "Cellular organization, metabolism, and reproduction", "Multicellularity"], ans: 2, exp: "All living organisms share: (1) cellular organization, (2) metabolism (chemical reactions to obtain/use energy), (3) homeostasis, (4) growth and development, (5) reproduction, (6) response to environment, and (7) evolutionary adaptation." },
                    { q: "The domain Bacteria includes which of the following groups important in cycling nutrients?", choices: ["Slime molds", "Nitrogen-fixing bacteria (e.g., Rhizobium), decomposers, and cyanobacteria", "Yeasts and mushrooms", "Ferns and mosses"], ans: 1, exp: "Bacteria play critical roles in biogeochemical cycling: nitrogen-fixers convert N₂ to ammonia (essential for all organisms), nitrifying bacteria convert ammonia to nitrate, and decomposers break down dead organic matter, recycling nutrients." },
                ]
            }
        ];

        // ═══════════════════════════════════════════════
        // STATE
        // ═══════════════════════════════════════════════
        let state = {
            currentUnit: 0,
            answers: {}, // key: "u0-q5" => { selected, correct }
        };

        function getKey(u, q) { return `${u}-${q}`; }

        function getStats() {
            let answered = 0, correct = 0;
            Object.values(state.answers).forEach(a => { answered++; if (a.correct) correct++; });
            return { answered, correct, total: 300 };
        }

        function getUnitStats(unitIdx) {
            const unit = UNITS[unitIdx];
            let answered = 0, correct = 0;
            unit.questions.forEach((_, qi) => {
                const a = state.answers[getKey(unitIdx, qi)];
                if (a) { answered++; if (a.correct) correct++; }
            });
            return { answered, correct, total: unit.questions.length };
        }

        // ═══════════════════════════════════════════════
        // RENDER
        // ═══════════════════════════════════════════════
        function updateHeader() {
            const s = getStats();
            document.getElementById('answered-count').textContent = s.answered;
            document.getElementById('correct-count').textContent = s.correct;
            document.getElementById('score-pct').textContent = s.answered > 0
                ? Math.round(s.correct / s.answered * 100) + '%' : '—';
        }

        function buildSidebar() {
            const nav = document.getElementById('sidebar-nav');
            nav.innerHTML = '';
            // overview button
            const ov = document.createElement('button');
            ov.className = 'unit-btn';
            ov.innerHTML = `<span class="unit-label">SUMMARY</span>📊 All Units Overview`;
            ov.onclick = showOverview;
            nav.appendChild(ov);

            UNITS.forEach((unit, idx) => {
                const s = getUnitStats(idx);
                const pct = s.total > 0 ? s.answered / s.total * 100 : 0;
                const btn = document.createElement('button');
                btn.className = `unit-btn u${idx + 1}${state.currentUnit === idx ? ' active' : ''}`;
                btn.id = `sidebar-unit-${idx}`;
                btn.innerHTML = `<span class="unit-label">${unit.label} • ${s.answered}/${s.total}</span>${unit.title}`;
                btn.onclick = () => showUnit(idx);
                nav.appendChild(btn);

                const bar = document.createElement('div');
                bar.className = 'unit-progress-bar';
                bar.innerHTML = `<div class="unit-progress-fill" id="upf-${idx}" style="width:${pct}%;background:${unit.color}"></div>`;
                nav.appendChild(bar);
            });
        }

        function showUnit(unitIdx) {
            state.currentUnit = unitIdx;
            document.getElementById('overview').style.display = 'none';
            const main = document.getElementById('main');
            main.style.display = 'block';

            // update sidebar
            document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('active'));
            const sb = document.getElementById(`sidebar-unit-${unitIdx}`);
            if (sb) sb.classList.add('active');

            const unit = UNITS[unitIdx];
            const s = getUnitStats(unitIdx);
            const color = unit.color;

            let html = `
    <div class="unit-header">
      <div class="unit-tag" style="color:${color};border-color:${color};background:${color}18">${unit.label} — ${s.answered}/${unit.questions.length} answered</div>
      <h2>${unit.title}</h2>
      <p>${unit.desc}</p>
    </div>
    <div class="quiz-controls">
      <button class="btn primary" onclick="resetUnit(${unitIdx})">↺ Reset This Unit</button>
      <div class="score-display">Unit Score: <span>${s.correct}/${s.answered || 0}</span></div>
    </div>
  `;

            // Global offset for question numbers
            const offset = UNITS.slice(0, unitIdx).reduce((sum, u) => sum + u.questions.length, 0);

            unit.questions.forEach((q, qi) => {
                const key = getKey(unitIdx, qi);
                const answer = state.answers[key];
                const globalNum = offset + qi + 1;
                const letters = ['A', 'B', 'C', 'D'];

                html += `<div class="q-card" id="qcard-${key}">
      <div class="q-header">
        <div class="q-num">#${globalNum}</div>
        <div class="q-text">${q.q}</div>
      </div>
      <div class="choices" id="choices-${key}">`;

                q.choices.forEach((c, ci) => {
                    let cls = 'choice-btn';
                    if (answer) {
                        cls += ' locked';
                        if (ci === q.ans) cls += ' correct';
                        else if (ci === answer.selected) cls += ' wrong';
                    }
                    html += `<button class="${cls}" onclick="selectAnswer(${unitIdx},${qi},${ci})" id="choice-${key}-${ci}">
        <span class="choice-letter">${letters[ci]}</span>${c}
      </button>`;
                });

                html += `</div>`;
                if (answer) {
                    html += `<div class="explanation"><strong>💡 Explanation:</strong> ${q.exp}</div>`;
                }
                html += `</div>`;
            });

            main.innerHTML = html;
            updateHeader();
            updateSidebarProgress();
        }

        function selectAnswer(unitIdx, qi, chosen) {
            const key = getKey(unitIdx, qi);
            if (state.answers[key]) return; // already answered

            const q = UNITS[unitIdx].questions[qi];
            const isCorrect = chosen === q.ans;
            state.answers[key] = { selected: chosen, correct: isCorrect };

            // Update DOM
            const choicesDiv = document.getElementById(`choices-${key}`);
            const letters = ['A', 'B', 'C', 'D'];
            choicesDiv.querySelectorAll('.choice-btn').forEach((btn, ci) => {
                btn.classList.add('locked');
                if (ci === q.ans) btn.classList.add('correct');
                else if (ci === chosen) btn.classList.add('wrong');
            });

            // Add explanation
            const card = document.getElementById(`qcard-${key}`);
            const expDiv = document.createElement('div');
            expDiv.className = 'explanation';
            expDiv.innerHTML = `<strong>💡 Explanation:</strong> ${q.exp}`;
            card.appendChild(expDiv);

            updateHeader();
            updateSidebarProgress();

            // Check if unit is complete
            const s = getUnitStats(unitIdx);
            if (s.answered === s.total) {
                const banner = document.createElement('div');
                banner.style.cssText = 'background:linear-gradient(135deg,#1a4731,#0d2818);border:1px solid #3fb950;border-radius:10px;padding:16px 20px;margin-bottom:20px;text-align:center';
                banner.innerHTML = `<strong style="color:#3fb950;font-family:'Playfair Display',serif;font-size:1.1rem">✅ Unit Complete!</strong><br><span style="color:#aff3c5;font-size:.9rem">You scored ${s.correct}/${s.total} (${Math.round(s.correct / s.total * 100)}%) on ${UNITS[unitIdx].title}</span>`;
                const main = document.getElementById('main');
                const firstChild = main.querySelector('.unit-header');
                if (firstChild) main.insertBefore(banner, firstChild.nextSibling?.nextSibling || firstChild.nextSibling);
            }
        }

        function resetUnit(unitIdx) {
            if (!confirm('Reset all answers for this unit? This cannot be undone.')) return;
            const unit = UNITS[unitIdx];
            unit.questions.forEach((_, qi) => {
                delete state.answers[getKey(unitIdx, qi)];
            });
            showUnit(unitIdx);
        }

        function updateSidebarProgress() {
            UNITS.forEach((unit, idx) => {
                const s = getUnitStats(idx);
                const pct = s.total > 0 ? s.answered / s.total * 100 : 0;
                const fill = document.getElementById(`upf-${idx}`);
                if (fill) fill.style.width = pct + '%';
            });
        }

        function showOverview() {
            document.getElementById('main').style.display = 'none';
            const ov = document.getElementById('overview');
            ov.style.display = 'block';

            const total = getStats();
            const allDone = total.answered === total.total;

            let html = `
    ${allDone ? `<div id="all-done-banner" style="display:block;background:linear-gradient(135deg,#1a4731,#0d2818);border:1px solid #3fb950;border-radius:12px;padding:24px;margin-bottom:24px;text-align:center">
      <h3 style="font-family:'Playfair Display',serif;color:#3fb950;font-size:1.5rem">🎉 All 300 Questions Complete!</h3>
      <p style="color:#aff3c5;margin-top:8px">Final Score: ${total.correct}/${total.total} — ${Math.round(total.correct / total.total * 100)}%</p>
    </div>` : ''}
    <div style="font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;margin-bottom:8px">📊 Progress Overview</div>
    <p style="color:var(--text2);font-size:.9rem;margin-bottom:4px">Total: <strong style="color:var(--text)">${total.answered}/300</strong> answered • <strong style="color:var(--accent2)">${total.correct}</strong> correct • Score: <strong style="color:var(--accent)">${total.answered > 0 ? Math.round(total.correct / total.answered * 100) : 0}%</strong></p>
    <div class="overview-grid">
  `;

            UNITS.forEach((unit, idx) => {
                const s = getUnitStats(idx);
                const pct = s.total > 0 ? Math.round(s.answered / s.total * 100) : 0;
                const score = s.answered > 0 ? Math.round(s.correct / s.answered * 100) : 0;
                html += `
      <div class="overview-card" onclick="showUnit(${idx})">
        <div style="font-family:'JetBrains Mono',monospace;font-size:.7rem;color:${unit.color};text-transform:uppercase;letter-spacing:.1em">${unit.label}</div>
        <h3>${unit.title}</h3>
        <p>${unit.desc}</p>
        <div class="ov-prog">
          <div class="ov-score">${s.answered}/${s.total} answered${s.answered > 0 ? ' • ' + score + '% correct' : ''}</div>
          <div class="ov-bar"><div class="ov-fill" style="width:${pct}%;background:${unit.color}"></div></div>
        </div>
      </div>
    `;
            });

            html += `</div>`;
            ov.innerHTML = html;
        }

        // ── INIT ──
        buildSidebar();
        showUnit(0);
    </script>
</body>

</html>
