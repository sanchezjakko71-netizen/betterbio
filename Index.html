<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biology Comprehensive Reviewer</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --bg2: #161b22;
            --bg3: #1c2128;
            --border: #30363d;
            --text: #e6edf3;
            --text2: #8b949e;
            --text3: #6e7681;
            --accent: #58a6ff;
            --accent2: #3fb950;
            --accent3: #d29922;
            --accent4: #f78166;
            --accent5: #bc8cff;
            --correct: #1a4731;
            --correct-border: #3fb950;
            --wrong: #4a1f1f;
            --wrong-border: #f85149;
            --unit1: #58a6ff;
            --unit2: #3fb950;
            --unit3: #bc8cff;
            --unit4: #d29922;
            --unit5: #f78166;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Source Serif 4', Georgia, serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── HEADER ── */
        #header {
            background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #1a1f2e 100%);
            border-bottom: 1px solid var(--border);
            padding: 28px 40px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        #header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.4rem, 3vw, 2.1rem);
            font-weight: 900;
            letter-spacing: -0.02em;
            background: linear-gradient(90deg, var(--accent), var(--accent5));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #header p {
            color: var(--text2);
            font-size: .85rem;
            margin-top: 3px;
            font-style: italic;
        }

        .header-meta {
            display: flex;
            gap: 20px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .stat-pill {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 14px;
            font-family: 'JetBrains Mono', monospace;
            font-size: .78rem;
            color: var(--text2);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-pill span {
            color: var(--text);
            font-weight: 500;
        }

        /* ── LAYOUT ── */
        #app {
            display: flex;
            min-height: calc(100vh - 120px);
        }

        /* ── SIDEBAR ── */
        #sidebar {
            width: 270px;
            min-width: 270px;
            background: var(--bg2);
            border-right: 1px solid var(--border);
            padding: 20px 0;
            overflow-y: auto;
            position: sticky;
            top: 120px;
            height: calc(100vh - 120px);
        }

        .sidebar-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: .7rem;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--text3);
            padding: 0 20px 12px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 8px;
        }

        .unit-btn {
            display: block;
            width: 100%;
            background: none;
            border: none;
            padding: 10px 20px;
            text-align: left;
            cursor: pointer;
            color: var(--text2);
            font-family: 'Source Serif 4', serif;
            font-size: .85rem;
            transition: all .15s;
            border-left: 3px solid transparent;
            line-height: 1.4;
        }

        .unit-btn:hover {
            background: var(--bg3);
            color: var(--text);
        }

        .unit-btn.active {
            color: var(--text);
            background: var(--bg3);
        }

        .unit-btn.u1.active {
            border-left-color: var(--unit1);
            color: var(--unit1);
        }

        .unit-btn.u2.active {
            border-left-color: var(--unit2);
            color: var(--unit2);
        }

        .unit-btn.u3.active {
            border-left-color: var(--unit3);
            color: var(--unit3);
        }

        .unit-btn.u4.active {
            border-left-color: var(--unit4);
            color: var(--unit4);
        }

        .unit-btn.u5.active {
            border-left-color: var(--unit5);
            color: var(--unit5);
        }

        .unit-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: .68rem;
            color: var(--text3);
            display: block;
            margin-bottom: 2px;
        }

        .unit-progress-bar {
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            margin: 5px 20px 2px;
            overflow: hidden;
        }

        .unit-progress-fill {
            height: 100%;
            border-radius: 2px;
            transition: width .4s;
        }

        /* ── MAIN CONTENT ── */
        #main {
            flex: 1;
            padding: 32px 40px;
            max-width: 900px;
        }

        .unit-header {
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .unit-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: .72rem;
            letter-spacing: .1em;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: inline-block;
            padding: 3px 10px;
            border-radius: 4px;
            border: 1px solid;
        }

        .unit-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.4rem, 2.5vw, 1.9rem);
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 6px;
        }

        .unit-header p {
            color: var(--text2);
            font-size: .9rem;
            font-style: italic;
        }

        /* ── QUESTION CARD ── */
        .q-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 18px;
            overflow: hidden;
            transition: border-color .2s;
        }

        .q-card:hover {
            border-color: #444d56;
        }

        .q-header {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 18px 20px 14px;
        }

        .q-num {
            font-family: 'JetBrains Mono', monospace;
            font-size: .75rem;
            color: var(--text3);
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 2px 8px;
            white-space: nowrap;
            margin-top: 2px;
            min-width: 44px;
            text-align: center;
        }

        .q-text {
            font-size: .95rem;
            line-height: 1.65;
            color: var(--text);
            flex: 1;
        }

        .choices {
            padding: 0 20px 18px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .choice-btn {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 7px;
            padding: 10px 16px;
            text-align: left;
            cursor: pointer;
            color: var(--text2);
            font-family: 'Source Serif 4', serif;
            font-size: .88rem;
            line-height: 1.5;
            transition: all .15s;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .choice-btn:hover:not(.locked) {
            border-color: var(--accent);
            color: var(--text);
            background: #1c2840;
        }

        .choice-letter {
            font-family: 'JetBrains Mono', monospace;
            font-size: .75rem;
            color: var(--text3);
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1px 6px;
            min-width: 24px;
            text-align: center;
            margin-top: 1px;
        }

        .choice-btn.correct {
            background: var(--correct);
            border-color: var(--correct-border);
            color: #aff3c5;
        }

        .choice-btn.correct .choice-letter {
            background: var(--correct-border);
            color: #0d1117;
            border-color: var(--correct-border);
        }

        .choice-btn.wrong {
            background: var(--wrong);
            border-color: var(--wrong-border);
            color: #ffa3a3;
        }

        .choice-btn.wrong .choice-letter {
            background: var(--wrong-border);
            color: #0d1117;
            border-color: var(--wrong-border);
        }

        .choice-btn.reveal-correct {
            background: var(--correct);
            border-color: var(--correct-border);
            color: #aff3c5;
            opacity: .7;
        }

        .choice-btn.locked {
            cursor: default;
        }

        .explanation {
            margin: 0 20px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 7px;
            padding: 12px 16px;
            font-size: .85rem;
            color: var(--text2);
            line-height: 1.6;
            border-left: 3px solid var(--accent2);
        }

        .explanation strong {
            color: var(--text);
        }

        /* ── CONTROLS ── */
        .quiz-controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 28px;
            align-items: center;
        }

        .btn {
            background: var(--bg2);
            border: 1px solid var(--border);
            color: var(--text2);
            padding: 8px 18px;
            border-radius: 7px;
            cursor: pointer;
            font-family: 'Source Serif 4', serif;
            font-size: .85rem;
            transition: all .15s;
        }

        .btn:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #0d1117;
            font-weight: 600;
        }

        .btn.primary:hover {
            background: #79b8ff;
        }

        .btn.danger {
            border-color: var(--wrong-border);
            color: var(--accent4);
        }

        .btn.danger:hover {
            background: var(--wrong);
        }

        .score-display {
            margin-left: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: .82rem;
            color: var(--text2);
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 7px;
            padding: 7px 14px;
        }

        .score-display span {
            color: var(--accent2);
            font-weight: 500;
        }

        /* ── OVERALL PROGRESS ── */
        #overview {
            display: none;
            padding: 32px 40px;
            max-width: 900px;
        }

        .overview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
            margin-top: 24px;
        }

        .overview-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            cursor: pointer;
            transition: all .2s;
        }

        .overview-card:hover {
            transform: translateY(-2px);
            border-color: #444;
        }

        .overview-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            margin: 8px 0 4px;
        }

        .overview-card p {
            font-size: .8rem;
            color: var(--text2);
        }

        .ov-prog {
            margin-top: 12px;
        }

        .ov-bar {
            height: 5px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 5px;
        }

        .ov-fill {
            height: 100%;
            border-radius: 3px;
            transition: width .4s;
        }

        .ov-score {
            font-family: 'JetBrains Mono', monospace;
            font-size: .75rem;
            color: var(--text3);
        }

        #all-done-banner {
            display: none;
            background: linear-gradient(135deg, #1a4731, #0d2818);
            border: 1px solid var(--correct-border);
            border-radius: 12px;
            padding: 24px 28px;
            margin-bottom: 24px;
            text-align: center;
        }

        #all-done-banner h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--accent2);
        }

        #all-done-banner p {
            color: #aff3c5;
            margin-top: 6px;
        }

        /* scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        @media(max-width:700px) {
            #sidebar {
                display: none;
            }

            #main {
                padding: 20px 16px;
            }

            #header {
                padding: 16px;
            }

            .header-meta {
                gap: 8px;
            }
        }
    </style>
</head>

<body>

    <div id="header">
        <h1>🧬 Biology Comprehensive Reviewer</h1>
        <p>Practice all five major units • 300 questions total</p>
        <div class="header-meta">
            <div class="stat-pill">Total Questions <span id="total-count">300</span></div>
            <div class="stat-pill">Answered <span id="answered-count">0</span></div>
            <div class="stat-pill">Correct <span id="correct-count">0</span></div>
            <div class="stat-pill">Score <span id="score-pct">—</span></div>
            <button class="btn" onclick="showOverview()" style="margin-left:auto">📊 Overview</button>
        </div>
    </div>

    <div id="app">
        <div id="sidebar">
            <div class="sidebar-title">Units</div>
            <div id="sidebar-nav"></div>
        </div>
        <div id="main"></div>
        <div id="overview"></div>
    </div>

    <script>
        // ═══════════════════════════════════════════════
        // DATA — 300 questions across 5 units
        // ═══════════════════════════════════════════════
        const UNITS = [
            {
                id: 'u1', label: 'Unit 1', color: 'var(--unit1)',
                title: "Life's Support & Protective Systems",
                desc: "Protection, support, bodily shape, internal organs, and movement for life activities",
                questions: [
                    // ── PROTECTION & SUPPORT (1-20) ──
                    { q: "What is the primary function of the skeletal system in vertebrates?", choices: ["Producing hormones", "Providing structural support and protecting internal organs", "Regulating blood sugar", "Filtering waste from blood"], ans: 1, exp: "The skeletal system provides the rigid framework that gives the body shape, supports body weight, and protects delicate internal organs such as the brain, heart, and lungs." },
                    { q: "Which type of tissue forms the hard outer layer of bones?", choices: ["Spongy bone", "Compact bone", "Cartilage", "Periosteum"], ans: 1, exp: "Compact (cortical) bone forms the dense outer shell of bones, providing strength and resistance to mechanical stress." },
                    { q: "What is the function of the periosteum?", choices: ["Producing red blood cells", "Covering and protecting the outer surface of bone", "Cushioning joints", "Storing fat"], ans: 1, exp: "The periosteum is a tough fibrous membrane that covers the outer surface of bones, containing nerves, blood vessels, and bone-forming cells (osteoblasts)." },
                    { q: "Cartilage differs from bone primarily because it:", choices: ["Contains no cells", "Is not vascularized (lacks blood vessels)", "Is softer than muscle", "Contains only collagen fibers"], ans: 1, exp: "Cartilage is avascular — it lacks blood vessels and relies on diffusion for nutrient supply. This limits its ability to repair quickly after injury." },
                    { q: "Which of the following is NOT a function of the human skeleton?", choices: ["Protection of organs", "Storage of minerals", "Synthesis of digestive enzymes", "Production of blood cells"], ans: 2, exp: "The skeleton does NOT produce digestive enzymes. That function belongs to glands such as the pancreas, liver, and salivary glands." },
                    { q: "Red blood cells and white blood cells are produced in the:", choices: ["Liver", "Spleen", "Red bone marrow", "Yellow bone marrow"], ans: 2, exp: "Red bone marrow is found in spongy bone tissue and is responsible for hematopoiesis — the production of red blood cells, white blood cells, and platelets." },
                    { q: "The exoskeleton of arthropods is composed mainly of:", choices: ["Calcium phosphate", "Chitin", "Cellulose", "Keratin"], ans: 1, exp: "The exoskeleton of arthropods (insects, crustaceans, arachnids) is composed primarily of chitin, a tough polysaccharide that provides both support and protection." },
                    { q: "In plants, which structure provides rigid support to the cell wall?", choices: ["Plasma membrane", "Cellulose microfibrils", "Vacuole", "Tonoplast"], ans: 1, exp: "Cellulose microfibrils are long chains of glucose arranged in a crystalline lattice that give plant cell walls their tensile strength and rigidity." },
                    { q: "Which of the following organisms has a hydrostatic skeleton?", choices: ["Grasshopper", "Earthworm", "Crab", "Fish"], ans: 1, exp: "Earthworms use a hydrostatic skeleton — they rely on fluid pressure within body cavities to maintain shape and enable movement through muscular contractions." },
                    { q: "What type of joint allows movement in all directions?", choices: ["Hinge joint", "Pivot joint", "Ball-and-socket joint", "Gliding joint"], ans: 2, exp: "Ball-and-socket joints (e.g., hip, shoulder) allow movement in multiple planes including flexion, extension, rotation, and circumduction." },
                    { q: "Ligaments connect:", choices: ["Muscle to bone", "Bone to bone", "Nerve to muscle", "Cartilage to skin"], ans: 1, exp: "Ligaments are tough bands of fibrous connective tissue that connect bone to bone, stabilizing joints and limiting excessive movement." },
                    { q: "Tendons connect:", choices: ["Bone to bone", "Muscle to bone", "Cartilage to muscle", "Nerve to organ"], ans: 1, exp: "Tendons are fibrous connective tissue structures that attach muscle to bone, transmitting the force of muscle contraction to produce movement." },
                    { q: "Which type of muscle tissue is found in the walls of hollow organs?", choices: ["Skeletal muscle", "Cardiac muscle", "Smooth muscle", "Striated muscle"], ans: 2, exp: "Smooth (visceral) muscle is found in the walls of hollow organs like the stomach, intestines, blood vessels, and uterus, controlling involuntary movements." },
                    { q: "The integumentary system provides protection primarily through:", choices: ["Producing antibodies", "Forming a physical barrier via the skin", "Filtering toxins in the kidney", "Secreting bile"], ans: 1, exp: "The skin (integument) acts as a physical barrier preventing entry of pathogens, UV radiation, chemicals, and water loss from the body." },
                    { q: "Which layer of the skin contains hair follicles and sweat glands?", choices: ["Epidermis", "Dermis", "Hypodermis", "Stratum corneum"], ans: 1, exp: "The dermis is the middle layer of skin containing hair follicles, sweat glands, sebaceous glands, nerve endings, and blood vessels." },
                    { q: "Melanin in the skin primarily functions to:", choices: ["Regulate body temperature", "Absorb and protect against UV radiation", "Synthesize vitamin A", "Produce antibodies"], ans: 1, exp: "Melanin is a pigment produced by melanocytes that absorbs UV radiation, protecting underlying tissues from DNA damage that could lead to skin cancer." },
                    { q: "Which of the following best describes spongy bone?", choices: ["Dense, compact structure with no spaces", "Lattice-like structure with spaces filled with marrow", "Flexible tissue made of collagen only", "Avascular tissue for cushioning"], ans: 1, exp: "Spongy (cancellous) bone has a lattice-like trabecular structure with spaces containing red bone marrow, making it lighter but still strong." },
                    { q: "Osteoporosis results from:", choices: ["Excess bone density", "Reduction in bone mass and density, increasing fracture risk", "Inflammation of tendons", "Overproduction of cartilage"], ans: 1, exp: "Osteoporosis occurs when bone resorption exceeds bone formation, leading to decreased bone density and increased susceptibility to fractures." },
                    { q: "The axial skeleton includes:", choices: ["Arms and legs", "Skull, vertebral column, and rib cage", "Pelvic girdle and shoulder girdle", "Only the skull"], ans: 1, exp: "The axial skeleton forms the central axis of the body and includes the skull, vertebral column, sternum, and ribs — 80 bones in total." },
                    { q: "Which protein gives skin its waterproofing property?", choices: ["Collagen", "Elastin", "Keratin", "Fibrin"], ans: 2, exp: "Keratin is a fibrous structural protein that makes up the outermost layers of the epidermis, hair, and nails, providing waterproofing and protection." },
                    // ── MOVEMENT (21-40) ──
                    { q: "The sliding filament theory of muscle contraction involves:", choices: ["Actin and myosin filaments sliding past each other", "Muscle fibers breaking and reforming", "Calcium dissolving muscle proteins", "ATP directly pulling bones"], ans: 0, exp: "According to the sliding filament theory, muscle contraction occurs when actin (thin) and myosin (thick) filaments slide past each other, shortening the sarcomere without the filaments themselves changing length." },
                    { q: "What molecule provides direct energy for muscle contraction?", choices: ["Glucose", "Glycogen", "ATP", "NADH"], ans: 2, exp: "ATP (adenosine triphosphate) is the direct energy currency for muscle contraction. Myosin heads hydrolyze ATP to ADP + Pi to power the power stroke." },
                    { q: "Calcium ions in muscle contraction bind to:", choices: ["Myosin", "Troponin on the actin filament", "The Z-disk", "The M-line"], ans: 1, exp: "Calcium ions released from the sarcoplasmic reticulum bind to troponin, causing a conformational change that moves tropomyosin to expose binding sites on actin for myosin heads." },
                    { q: "Which type of locomotion do fish primarily use?", choices: ["Jet propulsion", "Lateral undulation of the body and tail", "Walking on fins", "Rowing with paired fins"], ans: 1, exp: "Most fish swim by lateral undulation — contracting muscles in alternating waves along the body to produce a sinusoidal motion that propels the fish forward." },
                    { q: "Insects use which structure for flight?", choices: ["Modified forelimbs only", "Wings derived from outgrowths of the thorax", "Elongated hind legs", "Hollow bones"], ans: 1, exp: "Insect wings are thin membranous outgrowths of the thoracic exoskeleton, powered by flight muscles. Insects are the only invertebrates capable of true flight." },
                    { q: "Bipedalism in humans is associated with which skeletal adaptation?", choices: ["Curved spine with four curves", "Flat-footed posture", "Large canine teeth", "Reduced pelvic angle"], ans: 0, exp: "The human spine has four natural curves (cervical, thoracic, lumbar, sacral) that distribute body weight and absorb shock during upright bipedal locomotion." },
                    { q: "Which of the following allows bones to move at a joint?", choices: ["Ligaments contracting", "Muscles contracting and pulling on bones via tendons", "Cartilage pumping", "Bone marrow expanding"], ans: 1, exp: "Skeletal muscles contract and pull on bones through tendons, creating movement at joints. Muscles work in antagonistic pairs — one contracts while the other relaxes." },
                    { q: "The function of synovial fluid in a joint is to:", choices: ["Produce red blood cells", "Lubricate the joint and reduce friction", "Transmit nerve signals", "Secrete antibodies"], ans: 1, exp: "Synovial fluid is a viscous lubricant secreted by the synovial membrane in freely movable joints, reducing friction between articular cartilage surfaces." },
                    { q: "Which muscle type is involuntary and striated?", choices: ["Smooth muscle", "Skeletal muscle", "Cardiac muscle", "Ciliary muscle"], ans: 2, exp: "Cardiac muscle is both striated (like skeletal muscle) and involuntary (like smooth muscle). It is found only in the heart and has unique intercalated discs." },
                    { q: "Peristalsis is the wave-like muscular contraction that moves food through the:", choices: ["Skeleton", "Digestive tract", "Blood vessels", "Lungs"], ans: 1, exp: "Peristalsis refers to the rhythmic contractions of smooth muscle in the walls of the digestive tract that propel food boluses from the esophagus to the rectum." },
                    { q: "Which of these joints is an example of a hinge joint?", choices: ["Hip joint", "Shoulder joint", "Elbow joint", "Wrist joint"], ans: 2, exp: "The elbow joint is a classic hinge joint that allows movement in only one plane — flexion and extension. The knee is another example of a hinge joint." },
                    { q: "Cilia and flagella produce movement by:", choices: ["Expanding and contracting", "Bending through interaction of microtubules and dynein motors", "Pumping fluid like a heart", "Using actin-myosin interactions"], ans: 1, exp: "Cilia and flagella move via the 9+2 arrangement of microtubules (axoneme) powered by dynein motor proteins that cause adjacent microtubule doublets to slide, producing bending motion." },
                    { q: "The function of the Achilles tendon is to:", choices: ["Connect the femur to the tibia", "Connect the calf muscles to the heel bone (calcaneus)", "Lubricate the ankle joint", "Produce bone growth"], ans: 1, exp: "The Achilles tendon (calcaneal tendon) is the thickest and strongest tendon in the body, connecting the gastrocnemius and soleus muscles of the calf to the calcaneus (heel bone)." },
                    { q: "Muscle fatigue is primarily caused by:", choices: ["Too much oxygen in muscles", "Accumulation of lactate and depletion of ATP", "Excess calcium release", "Overproduction of myosin"], ans: 1, exp: "Muscle fatigue occurs due to the depletion of ATP, glycogen stores, and accumulation of metabolic byproducts such as lactate and inorganic phosphate that inhibit muscle function." },
                    { q: "Antagonistic muscle pairs work because:", choices: ["Both muscles contract simultaneously", "One muscle contracts while the other relaxes to produce movement", "Both muscles relax together", "Only one muscle exists at each joint"], ans: 1, exp: "Antagonistic muscle pairs — such as biceps and triceps — work oppositely: when one (agonist) contracts to produce movement, the opposing muscle (antagonist) relaxes to allow smooth motion." },
                    { q: "Which structure do amoebas use for movement?", choices: ["Flagella", "Cilia", "Pseudopodia", "Setae"], ans: 2, exp: "Amoebas use pseudopodia ('false feet') — temporary cytoplasmic extensions produced by the flow of cytoplasm — to move across surfaces and engulf food particles." },
                    { q: "The role of the skeleton in calcium homeostasis is to:", choices: ["Destroy excess calcium", "Store and release calcium as needed by the body", "Convert calcium to phosphorus", "Prevent calcium absorption"], ans: 1, exp: "Bones serve as the body's major calcium reservoir, storing about 99% of total body calcium. Parathyroid hormone (PTH) and calcitonin regulate calcium release from and deposition into bone." },
                    { q: "Fins in fish are analogous to which structure in humans?", choices: ["Ribs", "Limbs (arms and legs)", "Spine", "Skull"], ans: 1, exp: "Fish fins (especially paired pectoral and pelvic fins) are analogous to the limbs of terrestrial vertebrates — they provide steering, lift, and stability, corresponding functionally to arms and legs." },
                    { q: "Which of the following is a function of fascia in the body?", choices: ["Producing red blood cells", "Wrapping, connecting, and separating muscles and organs", "Synthesizing hormones", "Filtering lymph"], ans: 1, exp: "Fascia is a connective tissue sheath that wraps around muscles, organs, nerves, and blood vessels, providing structural support, reducing friction, and transmitting mechanical forces." },
                    { q: "Rickets is a disease caused by deficiency of:", choices: ["Vitamin C", "Vitamin D and calcium, affecting bone development", "Vitamin A", "Iron"], ans: 1, exp: "Rickets occurs in children due to deficiency of vitamin D, calcium, or phosphate, leading to soft and weak bones, skeletal deformities such as bowed legs and a protruding sternum." },
                ]
            },
            {
                id: 'u2', label: 'Unit 2', color: 'var(--unit2)',
                title: "Perpetuation of Life",
                desc: "Plant reproduction, animal reproduction, and human reproduction",
                questions: [
                    // PLANT REPRODUCTION (1-20)
                    { q: "In angiosperms, the male gametophyte is contained within the:", choices: ["Ovule", "Pollen grain", "Style", "Stigma"], ans: 1, exp: "The pollen grain is the male gametophyte (or contains it) in angiosperms. It carries two sperm cells that are released during double fertilization." },
                    { q: "Double fertilization in angiosperms produces:", choices: ["Two embryos", "One embryo and one endosperm", "Two seeds", "Two fruits"], ans: 1, exp: "Double fertilization is unique to angiosperms: one sperm fertilizes the egg to produce the diploid zygote (embryo), and the other sperm fuses with the two polar nuclei to produce triploid (3n) endosperm." },
                    { q: "Which of the following is a method of vegetative (asexual) reproduction in plants?", choices: ["Pollination", "Runner formation (stolons)", "Seed dispersal", "Cross-pollination"], ans: 1, exp: "Stolons (runners) are horizontal stems that grow along the ground and produce new plants at nodes — a form of vegetative reproduction seen in strawberries and grasses." },
                    { q: "The ovary of a flower develops into:", choices: ["A seed", "A fruit", "A pollen grain", "A leaf"], ans: 1, exp: "After fertilization, the ovary wall (pericarp) develops and matures into a fruit, which encloses and protects the seeds and aids in their dispersal." },
                    { q: "Pollination refers to the transfer of pollen from:", choices: ["Anther to stigma", "Stigma to ovule", "Ovary to stamen", "Petal to sepal"], ans: 0, exp: "Pollination is the transfer of pollen grains (containing the male gametophyte) from the anther (male structure) to the stigma (female receptive surface) of a flower." },
                    { q: "Wind-pollinated flowers typically have:", choices: ["Brightly colored petals and strong fragrance", "Small petals, large feathery stigmas, and abundant lightweight pollen", "Large sticky pollen and nectar", "Tubular corollas for insect entry"], ans: 1, exp: "Wind-pollinated (anemophilous) flowers are adapted for efficiency: they lack showy petals or fragrance, produce massive quantities of light smooth pollen, and have large feathery stigmas to catch airborne pollen." },
                    { q: "In ferns, the haploid stage of the life cycle that produces gametes is called the:", choices: ["Sporophyte", "Gametophyte (prothallus)", "Sporangium", "Rhizome"], ans: 1, exp: "The fern gametophyte, called a prothallus, is the small heart-shaped haploid plant that produces archegonia (eggs) and antheridia (sperm). It is independent and photosynthetic." },
                    { q: "Spores differ from seeds because spores:", choices: ["Contain an embryo", "Are produced sexually", "Are haploid and produced by meiosis without fertilization", "Require pollination"], ans: 2, exp: "Spores are haploid reproductive cells produced by meiosis directly — they do not require fertilization. Seeds, in contrast, contain a diploid embryo formed after fertilization." },
                    { q: "The seed coat (testa) develops from the:", choices: ["Endosperm", "Integuments of the ovule", "Petal", "Ovary wall"], ans: 1, exp: "The seed coat develops from the integuments — protective layers surrounding the ovule. It protects the embryo from desiccation, physical damage, and pathogens." },
                    { q: "Which hormone promotes fruit ripening and is a gas?", choices: ["Auxin", "Cytokinin", "Ethylene", "Gibberellin"], ans: 2, exp: "Ethylene is a gaseous plant hormone that promotes fruit ripening, leaf abscission, and senescence. It triggers enzymatic breakdown of cell walls and conversion of starch to sugars." },
                    { q: "Self-incompatibility in plants prevents:", choices: ["Cross-pollination", "Self-fertilization to promote genetic diversity", "Fruit development", "Seed germination"], ans: 1, exp: "Self-incompatibility is a genetic mechanism that prevents self-fertilization. When pollen lands on the stigma of the same plant, molecular recognition systems inhibit pollen tube growth, promoting outcrossing." },
                    { q: "Alternation of generations in plants refers to:", choices: ["The change from juvenile to adult stage", "The alternation between diploid sporophyte and haploid gametophyte generations", "Seasonal dormancy cycles", "The switch between sexual and vegetative reproduction"], ans: 1, exp: "Alternation of generations is the life cycle pattern in plants where a multicellular diploid sporophyte (2n) alternates with a multicellular haploid gametophyte (n), each producing the other." },
                    { q: "Gymnosperms differ from angiosperms in that gymnosperms:", choices: ["Produce flowers", "Have seeds enclosed in fruits", "Produce naked seeds not enclosed in fruit", "Undergo double fertilization"], ans: 2, exp: "Gymnosperms (conifers, cycads, ginkgo) produce 'naked seeds' not enclosed in an ovary/fruit. The name comes from Greek: gymnos (naked) + sperma (seed)." },
                    { q: "Grafting in horticulture is a form of:", choices: ["Sexual reproduction", "Asexual (vegetative) reproduction", "Spore formation", "Pollination"], ans: 1, exp: "Grafting joins tissues of two plants so they grow as a single plant. It is a form of vegetative (asexual) reproduction used to propagate desirable traits without seed variation." },
                    { q: "The process by which seeds begin active growth is called:", choices: ["Dormancy", "Germination", "Pollination", "Fertilization"], ans: 1, exp: "Germination is the resumption of active growth in a seed, triggered by favorable conditions: adequate water, oxygen, and temperature. The embryo begins metabolic activity and the radicle emerges first." },
                    { q: "Which structure in angiosperms becomes the endosperm after double fertilization?", choices: ["Egg cell + sperm", "Two polar nuclei + second sperm", "Antipodal cells", "Synergid cells"], ans: 1, exp: "In double fertilization, the second sperm cell fuses with the two polar nuclei of the central cell to form the triploid (3n) primary endosperm nucleus, which develops into the nutrient-rich endosperm." },
                    { q: "Mosses represent which stage more prominently in their life cycle?", choices: ["Sporophyte generation", "Gametophyte generation", "Both equally", "Neither"], ans: 1, exp: "In mosses (non-vascular plants), the gametophyte is the dominant visible green plant. The sporophyte is small, dependent on the gametophyte, and produces spores in a capsule on a stalk." },
                    { q: "Rhizomes, bulbs, and corms are all:", choices: ["Types of seeds", "Underground vegetative storage organs for asexual reproduction", "Aerial stems", "Parasitic structures"], ans: 1, exp: "Rhizomes (ginger, ferns), bulbs (onions, tulips), and corms (gladiolus, crocus) are all modified underground stems used for storage and vegetative reproduction." },
                    { q: "What is the role of the style in a flower?", choices: ["Producing pollen", "Supporting the stigma and providing a pathway for the pollen tube to the ovary", "Attracting pollinators", "Developing into fruit"], ans: 1, exp: "The style is the elongated stalk connecting the stigma to the ovary. After pollination, the pollen tube grows through the style to reach the ovules in the ovary for fertilization." },
                    { q: "Dispersal of seeds by animals eating fruits is called:", choices: ["Anemochory", "Zoochory/endozoochory", "Hydrochory", "Autochory"], ans: 1, exp: "Endozoochory (a type of zoochory) is seed dispersal via animal ingestion — animals eat fruits and disperse seeds through their feces. This is common in many berry- and fruit-producing plants." },
                    // ANIMAL REPRODUCTION (21-40)
                    { q: "Which type of reproduction produces offspring genetically identical to the parent?", choices: ["Sexual reproduction", "Asexual reproduction", "Budding only", "Parthenogenesis only"], ans: 1, exp: "Asexual reproduction (budding, fission, fragmentation, parthenogenesis) produces offspring that are genetically identical clones of the parent, as no fertilization or genetic recombination occurs." },
                    { q: "External fertilization is most common in:", choices: ["Terrestrial mammals", "Reptiles", "Aquatic animals like fish and amphibians", "Birds"], ans: 2, exp: "External fertilization occurs outside the body, requiring a moist aquatic environment to prevent gamete desiccation. It is common in fish, amphibians, and many marine invertebrates." },
                    { q: "Internal fertilization is an adaptation that:", choices: ["Requires water for gamete transfer", "Protects gametes from drying out in terrestrial environments", "Reduces the number of eggs needed", "Prevents genetic diversity"], ans: 1, exp: "Internal fertilization keeps gametes moist within the female reproductive tract, enabling successful fertilization in terrestrial environments where external fertilization would result in gamete desiccation." },
                    { q: "Budding in Hydra is an example of:", choices: ["Sexual reproduction", "Asexual reproduction", "Sporulation", "Conjugation"], ans: 1, exp: "Budding in Hydra is asexual — a new individual grows as an outgrowth (bud) on the parent's body, eventually detaching to become an independent organism genetically identical to the parent." },
                    { q: "Parthenogenesis is defined as:", choices: ["Fertilization by two sperm", "Development of an unfertilized egg into a new individual", "Asexual reproduction by budding", "Self-fertilization in hermaphrodites"], ans: 1, exp: "Parthenogenesis is a form of asexual reproduction where an unfertilized egg develops into a new individual. It occurs in bees (drones), some lizards, komodo dragons, and certain fish species." },
                    { q: "Oviparous animals are those that:", choices: ["Give birth to live young", "Lay eggs that develop and hatch outside the mother's body", "Retain eggs internally for nourishment", "Reproduce asexually"], ans: 1, exp: "Oviparous animals lay eggs that develop externally. Examples include most fish, amphibians, reptiles, all birds, and monotreme mammals like the platypus." },
                    { q: "Viviparous animals are those that:", choices: ["Lay large yolk-rich eggs", "Give birth to live young nourished by placenta", "Retain fertilized eggs internally without placental connection", "Reproduce by budding"], ans: 1, exp: "Viviparous animals (most mammals) give birth to live young. The embryo develops inside the uterus, receiving nutrients and oxygen through the placenta from the mother's bloodstream." },
                    { q: "Which hormone triggers ovulation in female mammals?", choices: ["Estrogen", "Progesterone", "Luteinizing hormone (LH)", "Follicle-stimulating hormone (FSH)"], ans: 2, exp: "The LH surge — a sudden peak in luteinizing hormone from the anterior pituitary — triggers ovulation, the release of the mature oocyte from the Graafian follicle." },
                    { q: "Spermatogenesis occurs in the:", choices: ["Epididymis", "Seminiferous tubules of the testes", "Seminal vesicles", "Vas deferens"], ans: 1, exp: "Spermatogenesis — the production of sperm through meiosis and differentiation — occurs in the seminiferous tubules of the testes, where spermatogonia undergo mitosis and meiosis to produce spermatozoa." },
                    { q: "Metamorphosis in amphibians is triggered primarily by:", choices: ["Estrogen", "Thyroxine (thyroid hormone)", "Growth hormone", "Insulin"], ans: 1, exp: "Thyroid hormone (thyroxine) is the primary trigger for metamorphosis in amphibians, driving the dramatic transformation from aquatic larval forms (tadpoles) to terrestrial adult frogs." },
                    { q: "The chorion, amnion, allantois, and yolk sac are collectively called:", choices: ["Germ layers", "Extraembryonic membranes", "Neural tube derivatives", "Placental layers"], ans: 1, exp: "These four structures are extraembryonic membranes — they develop from the embryo but are not part of it, instead forming protective and nutritive structures around the developing embryo in amniotes." },
                    { q: "Which of the following is a characteristic of amniotic eggs?", choices: ["They require water for development", "They are found only in fish", "They have a leathery or calcified shell protecting a fluid-filled sac", "They hatch as larvae"], ans: 2, exp: "The amniotic egg is an evolutionary innovation of reptiles, birds, and monotremes, allowing reproduction on land. It has a protective shell and fluid-filled amnion that surrounds the embryo, eliminating dependence on water." },
                    { q: "Regeneration as a form of reproduction is seen in:", choices: ["Dogs and cats", "Sea stars (starfish) and planarians", "Birds", "Reptiles only"], ans: 1, exp: "Sea stars and planarians (flatworms) can regenerate entire organisms from fragments — a form of asexual reproduction. A single arm with part of the central disc can regenerate a complete sea star." },
                    { q: "The corpus luteum produces which hormone to maintain early pregnancy?", choices: ["Estrogen only", "Progesterone", "Testosterone", "Oxytocin"], ans: 1, exp: "After ovulation, the ruptured follicle becomes the corpus luteum, which secretes progesterone. Progesterone maintains the uterine lining (endometrium) and suppresses further ovulation during early pregnancy." },
                    { q: "In sexual reproduction, genetic variation is primarily produced through:", choices: ["Mitosis", "Meiosis and fertilization", "Asexual budding", "Parthenogenesis"], ans: 1, exp: "Sexual reproduction generates genetic variation through: (1) independent assortment during meiosis I, (2) crossing over during meiosis I, and (3) random fertilization of gametes." },
                    { q: "Hermaphroditism in animals means an individual:", choices: ["Reproduces asexually", "Has both male and female reproductive organs", "Can only self-fertilize", "Changes sex completely throughout life"], ans: 1, exp: "Hermaphrodites possess both male and female reproductive organs. Sequential hermaphrodites change from one sex to another; simultaneous hermaphrodites (earthworms, many snails) have both at the same time." },
                    { q: "The process of cleavage in embryonic development refers to:", choices: ["Fertilization of the egg", "Rapid mitotic divisions of the zygote without cell growth", "Migration of cells to form the embryo", "Development of the placenta"], ans: 1, exp: "Cleavage is the series of rapid mitotic divisions immediately following fertilization. Cells divide without growing, producing progressively smaller cells called blastomeres that form the morula and then blastula." },
                    { q: "Gastrulation produces which primary germ layers?", choices: ["Epidermis and dermis", "Ectoderm, mesoderm, and endoderm", "Cortex and medulla", "Amnion and chorion"], ans: 1, exp: "Gastrulation is the process by which the blastula reorganizes into three primary germ layers: ectoderm (outer), mesoderm (middle), and endoderm (inner), which give rise to all body tissues and organs." },
                    { q: "Which of the following animals exhibits complete (holometabolous) metamorphosis?", choices: ["Grasshopper", "Cockroach", "Butterfly", "Dragonfly nymph"], ans: 2, exp: "Butterflies (and moths, beetles, flies, bees) undergo holometabolous (complete) metamorphosis: egg → larva (caterpillar) → pupa (chrysalis) → adult. Each stage is morphologically distinct." },
                    { q: "K-strategists are species that:", choices: ["Produce many offspring with little parental care", "Produce few offspring with high parental investment", "Reproduce only once in their lifetime", "Are exclusively asexual"], ans: 1, exp: "K-strategists (like elephants, humans, whales) produce few offspring but invest heavily in parental care, resulting in high survival rates. This contrasts with r-strategists that produce many offspring with minimal care." },
                    // HUMAN REPRODUCTION (41-60)
                    { q: "Fertilization in humans normally occurs in the:", choices: ["Uterus", "Vagina", "Fallopian tube (oviduct)", "Ovary"], ans: 2, exp: "Fertilization typically occurs in the ampulla of the fallopian tube (oviduct). The sperm meets and penetrates the oocyte here, usually within 24 hours of ovulation." },
                    { q: "After fertilization, the implanted embryo at 8 weeks is called a:", choices: ["Zygote", "Morula", "Blastocyst", "Fetus"], ans: 3, exp: "From fertilization to 8 weeks, it is called an embryo. After 8 weeks (when all major organs have begun forming), it is called a fetus, which continues to grow and mature until birth." },
                    { q: "The placenta serves to:", choices: ["Produce sperm", "Exchange nutrients, gases, and wastes between mother and fetus", "Produce milk for the infant", "Store amniotic fluid"], ans: 1, exp: "The placenta is a specialized organ that facilitates exchange of oxygen, nutrients, hormones, and antibodies from mother to fetus, and waste products (CO₂, urea) from fetus to mother, without direct mixing of blood." },
                    { q: "Human Chorionic Gonadotropin (hCG) is the hormone detected by:", choices: ["Blood pressure monitors", "Pregnancy tests", "Glucose meters", "Ovulation predictor kits"], ans: 1, exp: "hCG is produced by the trophoblast cells of the developing embryo after implantation. Home pregnancy tests detect hCG in urine, confirming implantation has occurred." },
                    { q: "The acrosome reaction in sperm functions to:", choices: ["Provide energy for swimming", "Release enzymes that help penetrate the egg's zona pellucida", "Prevent polyspermy", "Maintain sperm motility in acidic environments"], ans: 1, exp: "The acrosome is a cap-like structure on the sperm head containing hydrolytic enzymes. When sperm contacts the zona pellucida, the acrosome reaction releases these enzymes to digest a path through the egg's protective layers." },
                    { q: "How many chromosomes does a normal human zygote contain?", choices: ["23", "46", "48", "92"], ans: 1, exp: "A human zygote contains 46 chromosomes — 23 from the egg (maternal haploid set) and 23 from the sperm (paternal haploid set), restoring the diploid number characteristic of human somatic cells." },
                    { q: "Oxytocin during childbirth functions to:", choices: ["Suppress uterine contractions", "Stimulate uterine contractions and progression of labor", "Maintain the corpus luteum", "Produce colostrum"], ans: 1, exp: "Oxytocin from the posterior pituitary stimulates uterine (myometrial) contractions during labor in a positive feedback loop — contractions stimulate more oxytocin release, intensifying labor until delivery." },
                    { q: "Which process is used during meiosis to produce genetic diversity?", choices: ["DNA replication", "Crossing over (recombination) between homologous chromosomes", "Chromosome doubling", "Cell differentiation"], ans: 1, exp: "Crossing over (chromosomal recombination) occurs during prophase I of meiosis, when homologous chromosomes exchange segments at chiasmata, creating new combinations of alleles on each chromosome." },
                    { q: "Estrogen in females is primarily produced by:", choices: ["Adrenal glands", "The corpus luteum only", "Ovarian follicle cells (granulosa cells)", "The anterior pituitary"], ans: 2, exp: "Estrogen (primarily estradiol) is produced by granulosa cells of developing ovarian follicles under FSH stimulation. It promotes development of secondary sex characteristics and prepares the uterus for potential implantation." },
                    { q: "The umbilical cord contains:", choices: ["One vein and two arteries", "Two veins and one artery", "Three arteries", "One vein only"], ans: 0, exp: "The umbilical cord contains two umbilical arteries (carrying deoxygenated blood and waste from fetus to placenta) and one umbilical vein (carrying oxygenated, nutrient-rich blood from placenta to fetus)." },
                    { q: "Testosterone in males is primarily produced in the:", choices: ["Seminal vesicles", "Leydig cells of the testes", "Prostate gland", "Epididymis"], ans: 1, exp: "Testosterone is produced by Leydig (interstitial) cells in the testes, stimulated by LH from the anterior pituitary. It drives spermatogenesis, secondary sex characteristics, and libido." },
                    { q: "What event marks the beginning of the second trimester of human pregnancy?", choices: ["Week 1", "Week 13", "Week 27", "Week 38"], ans: 1, exp: "The second trimester spans weeks 13–26. During this period the fetus grows rapidly, organ systems develop further, and the mother typically feels fetal movements (quickening) for the first time." },
                    { q: "The zona pellucida of the egg serves to:", choices: ["Nourish the oocyte", "Prevent polyspermy after fertilization and protect the early embryo", "Produce hormones", "Enable sperm attraction"], ans: 1, exp: "The zona pellucida is a glycoprotein layer surrounding the oocyte. After fertilization, the cortical reaction hardens the zona pellucida (zona reaction), blocking additional sperm entry and preventing polyspermy." },
                    { q: "Morning sickness in early pregnancy is associated with rising levels of:", choices: ["Progesterone", "Estrogen", "hCG (human chorionic gonadotropin)", "Relaxin"], ans: 2, exp: "hCG levels rise sharply in the first trimester (peaking around 8–10 weeks). This is correlated with nausea and vomiting of pregnancy (morning sickness), though the exact mechanism is still studied." },
                    { q: "Which of the following describes in vitro fertilization (IVF)?", choices: ["Fertilization inside the fallopian tube surgically", "Fertilization occurring outside the body in a laboratory dish", "Hormonal stimulation of natural fertilization", "Transplanting a fertilized egg from a donor"], ans: 1, exp: "IVF involves retrieving mature oocytes from the ovaries, fertilizing them with sperm in a laboratory dish (in vitro = 'in glass'), allowing embryo development for 3–5 days, then transferring selected embryos to the uterus." },
                    { q: "The male reproductive cell (sperm) is produced through a process called:", choices: ["Oogenesis", "Spermatogenesis", "Gametogenesis in general", "Mitosis only"], ans: 1, exp: "Spermatogenesis is the specific process of sperm production occurring in the seminiferous tubules from puberty onward. It involves mitosis of spermatogonia, meiosis to produce spermatids, and spermiogenesis (maturation into sperm)." },
                    { q: "Ovulation in a 28-day menstrual cycle typically occurs around day:", choices: ["Day 1", "Day 7", "Day 14", "Day 28"], ans: 2, exp: "In a typical 28-day cycle, ovulation occurs around day 14 (mid-cycle), triggered by the LH surge. The fertile window extends approximately 5 days before and 1 day after ovulation." },
                    { q: "During the follicular phase of the menstrual cycle, which hormone is dominant?", choices: ["Progesterone", "Estrogen", "hCG", "Oxytocin"], ans: 1, exp: "During the follicular phase (days 1–14), FSH stimulates follicle growth, and the developing follicles produce increasing amounts of estrogen, which thickens the endometrium and triggers the LH surge." },
                    { q: "The term 'gestation period' refers to:", choices: ["Time from birth to sexual maturity", "Duration of pregnancy from fertilization to birth", "Time of menstrual cycle", "Period of lactation"], ans: 1, exp: "Gestation period is the time from fertilization (or implantation) to birth. In humans this is approximately 38 weeks (from fertilization) or 40 weeks from the last menstrual period." },
                    { q: "Which structure produces progesterone to maintain pregnancy after the first trimester?", choices: ["Corpus luteum", "The placenta", "The hypothalamus", "Follicle cells"], ans: 1, exp: "During the first trimester, hCG maintains the corpus luteum, which produces progesterone. After approximately 10–12 weeks, the placenta takes over as the main source of progesterone to maintain the pregnancy." },
                ]
            },
            {
                id: 'u3', label: 'Unit 3', color: 'var(--unit3)',
                title: "My Genes Control My Traits",
                desc: "Genetics in the 21st century, inheritance, genotypes, and phenotypes",
                questions: [
                    // GENETICS AS SCIENCE (1-15)
                    { q: "The Human Genome Project was completed in approximately:", choices: ["1953", "1973", "2003", "2023"], ans: 2, exp: "The Human Genome Project (HGP) was an international scientific effort completed in 2003 that sequenced the entire human genome (~3.2 billion base pairs), identifying approximately 20,000–25,000 human protein-coding genes." },
                    { q: "CRISPR-Cas9 is a tool used for:", choices: ["Sequencing DNA", "Precisely editing gene sequences in organisms", "Amplifying DNA by PCR", "Inserting chromosomes into cells"], ans: 1, exp: "CRISPR-Cas9 is a revolutionary gene-editing technology that uses guide RNA to direct the Cas9 endonuclease to a specific DNA sequence, where it makes a precise cut allowing deletion, correction, or insertion of genetic material." },
                    { q: "PCR (Polymerase Chain Reaction) is used to:", choices: ["Sequence entire genomes", "Amplify specific DNA sequences for analysis", "Edit genes in living organisms", "Create recombinant proteins"], ans: 1, exp: "PCR amplifies a specific DNA sequence through repeated cycles of denaturation, primer annealing, and extension by DNA polymerase, producing billions of copies of the target sequence from minimal starting material." },
                    { q: "Pharmacogenomics studies:", choices: ["How drugs are synthesized", "How genetic variation affects individual drug responses", "The evolution of bacteria under antibiotics", "Gene therapy protocols"], ans: 1, exp: "Pharmacogenomics examines how an individual's genetic makeup — particularly variations in drug-metabolizing enzymes, transporters, and receptors — influences drug efficacy and risk of adverse reactions." },
                    { q: "Recombinant DNA technology involves:", choices: ["Natural genetic recombination during meiosis", "Combining DNA from different organisms to create new genetic combinations", "Selective breeding only", "Chromosome mapping"], ans: 1, exp: "Recombinant DNA technology uses restriction enzymes and DNA ligase to cut and join DNA from different organisms, creating recombinant constructs. This underpins the production of insulin, vaccines, and genetically modified organisms." },
                    { q: "The central dogma of molecular biology describes the flow of genetic information as:", choices: ["RNA → DNA → Protein", "DNA → RNA → Protein", "Protein → RNA → DNA", "DNA → Protein → RNA"], ans: 1, exp: "The central dogma (Crick, 1958) states that genetic information flows from DNA (transcription) → RNA → Protein (translation), with RNA as the intermediate messenger. Reverse transcription (RNA→DNA) is an exception in retroviruses." },
                    { q: "Gene therapy involves:", choices: ["Breeding organisms with desired traits", "Introducing functional genes into cells to treat genetic disorders", "Mapping all genes in the human genome", "Using antibiotics to silence genes"], ans: 1, exp: "Gene therapy introduces, alters, or replaces genetic material in a patient's cells to treat or prevent disease. It can involve correcting a mutated gene, silencing a disease-causing gene, or introducing a new therapeutic gene." },
                    { q: "Which of the following is an application of genomics in medicine?", choices: ["Blood type testing", "Personalized cancer treatment based on tumor genetics", "Standard X-ray diagnosis", "Measuring blood pressure"], ans: 1, exp: "Personalized (precision) medicine uses genomic information — such as tumor mutation profiles — to select treatments most likely to be effective for an individual patient, minimizing trial and error." },
                    { q: "Transgenic organisms are organisms that:", choices: ["Have been bred through natural selection", "Contain genes from a different species inserted into their genome", "Have undergone spontaneous mutations", "Are produced through selective breeding only"], ans: 1, exp: "Transgenic organisms have had foreign (from another species) DNA stably integrated into their genome using recombinant DNA techniques. Examples include Bt crops with insecticidal genes, and GloFish with fluorescent protein genes." },
                    { q: "DNA fingerprinting (profiling) is used in forensics to:", choices: ["Determine blood type", "Identify individuals based on unique patterns of repetitive DNA sequences", "Diagnose genetic diseases", "Sequence entire genomes at a crime scene"], ans: 1, exp: "DNA fingerprinting uses restriction fragment length polymorphisms (RFLPs) or short tandem repeats (STRs) — regions of repetitive DNA that vary among individuals — to generate a unique 'fingerprint' pattern for identification." },
                    { q: "What is a SNP (Single Nucleotide Polymorphism)?", choices: ["A type of chromosomal mutation", "A variation in a single DNA base pair at a specific position in the genome", "A large deletion in a chromosome", "A protein variation"], ans: 1, exp: "SNPs are the most common type of genetic variation — single nucleotide differences at a specific position in the genome between individuals. They can affect gene function, disease susceptibility, and drug response." },
                    { q: "Epigenetics studies changes in gene expression that:", choices: ["Involve changes in DNA sequence", "Do not involve changes in DNA sequence but affect gene activity", "Are caused by radiation mutations", "Result in chromosome rearrangements"], ans: 1, exp: "Epigenetics studies heritable changes in gene expression or function caused by mechanisms other than alterations in DNA sequence — including DNA methylation, histone modification, and chromatin remodeling." },
                    { q: "Bioinformatics combines:", choices: ["Biology and physics", "Computer science with biological data (especially genomic sequences)", "Chemistry and geology", "Medicine and engineering"], ans: 1, exp: "Bioinformatics applies computational tools and statistical methods to analyze and interpret biological data, especially large-scale genomic and proteomic datasets generated by sequencing technologies." },
                    { q: "Stem cells are valuable in medicine because they:", choices: ["Cannot divide", "Are already fully differentiated", "Have the potential to differentiate into multiple cell types for tissue repair", "Produce only antibodies"], ans: 2, exp: "Stem cells (especially pluripotent stem cells) can self-renew and differentiate into various specialized cell types, making them potentially valuable for regenerative medicine, drug testing, and disease modeling." },
                    { q: "The discovery of the double helix structure of DNA is attributed to:", choices: ["Mendel and Morgan", "Watson, Crick, Franklin, and Wilkins", "Darwin and Wallace", "Pasteur and Koch"], ans: 1, exp: "The double helix structure of DNA was proposed by Watson and Crick in 1953, based critically on X-ray crystallography data produced by Rosalind Franklin and Maurice Wilkins. All four contributed to this discovery." },
                    // INHERITANCE (16-35)
                    { q: "Gregor Mendel's law of segregation states that:", choices: ["Traits blend together in offspring", "Each allele pair separates during gamete formation so each gamete carries only one allele", "Traits sort independently", "Dominant alleles mask recessive ones in all crosses"], ans: 1, exp: "The law of segregation states that the two alleles for a given trait separate (segregate) during meiosis, so each gamete receives only one allele. The two alleles reunite at fertilization." },
                    { q: "In a monohybrid cross between two heterozygotes (Aa × Aa), the phenotypic ratio is:", choices: ["1:1", "1:2:1", "3:1", "9:3:3:1"], ans: 2, exp: "In an Aa × Aa cross, Punnett square gives: AA (1), Aa (2), aa (1) — genotypic ratio 1:2:1, but phenotypic ratio is 3:1 (three dominant-phenotype individuals to one recessive-phenotype individual)." },
                    { q: "A test cross is performed to determine:", choices: ["The genotype of a dominant phenotype individual", "The phenotype of a recessive individual", "The number of chromosomes in an organism", "The mutation rate"], ans: 0, exp: "A test cross crosses an individual showing the dominant phenotype (unknown genotype) with a homozygous recessive individual (aa). The ratio of offspring phenotypes reveals whether the dominant parent is AA or Aa." },
                    { q: "Codominance is best illustrated by:", choices: ["Tall plants being dominant over short plants", "ABO blood type where both A and B antigens are expressed in type AB individuals", "White flowers blending with red to produce pink", "One gene affecting multiple traits"], ans: 1, exp: "Codominance occurs when both alleles are fully expressed in the heterozygote. In AB blood type, both IA and IB alleles are expressed, producing both A and B antigens on red blood cells." },
                    { q: "Incomplete dominance produces a phenotype in heterozygotes that is:", choices: ["Identical to one parent", "Intermediate between the two parents", "A mixture of both parents' traits expressed separately", "More extreme than either parent"], ans: 1, exp: "In incomplete dominance, neither allele is completely dominant, resulting in an intermediate phenotype. Classic example: red (RR) × white (rr) snapdragons → pink (Rr) offspring." },
                    { q: "Sex-linked traits in humans are typically carried on the:", choices: ["Autosome 1", "Y chromosome only", "X chromosome", "Mitochondrial DNA"], ans: 2, exp: "X-linked traits are carried on the X chromosome. Because males have only one X chromosome (hemizygous), they express X-linked recessive traits more frequently than females, who need two copies to be affected." },
                    { q: "Colorblindness in humans is an example of an X-linked recessive trait. A carrier mother and normal-visioned father would have affected sons at a probability of:", choices: ["0%", "25%", "50%", "100%"], ans: 2, exp: "Carrier mother (X^B X^b) × normal father (X^B Y): sons receive Y from father and either X^B or X^b from mother. 50% of sons will inherit X^b and be colorblind." },
                    { q: "Mendel's law of independent assortment applies to genes that are:", choices: ["On the same chromosome (linked)", "On different chromosomes or far apart on the same chromosome", "Codominant", "Imprinted"], ans: 1, exp: "Independent assortment applies to genes on different chromosomes (or far apart on the same chromosome), which segregate independently during meiosis I. Linked genes violate this law unless separated by recombination." },
                    { q: "A dihybrid cross between two double heterozygotes (AaBb × AaBb) produces the phenotypic ratio:", choices: ["3:1", "1:2:1", "9:3:3:1", "1:1:1:1"], ans: 2, exp: "In a dihybrid cross (AaBb × AaBb) with independent assortment, the phenotypic ratio is 9:3:3:1 — 9 A_B_ : 3 A_bb : 3 aaB_ : 1 aabb." },
                    { q: "Linked genes are genes that:", choices: ["Code for the same protein", "Are located on the same chromosome and tend to be inherited together", "Are always expressed together", "Are found on different chromosomes"], ans: 1, exp: "Linked genes are located on the same chromosome and therefore tend to be inherited together (violating independent assortment). The closer they are, the more tightly linked (less recombination between them)." },
                    { q: "Morgan's work with Drosophila demonstrated gene linkage because:", choices: ["All traits showed 9:3:3:1 ratios", "Some trait pairs showed deviation from independent assortment, indicating physical linkage", "Fruit flies had no sex chromosomes", "All genes were on one chromosome"], ans: 1, exp: "T.H. Morgan's Drosophila experiments revealed that some gene pairs produced offspring ratios deviating from the 9:3:3:1 expected for independent assortment, demonstrating that genes on the same chromosome are physically linked." },
                    { q: "Epistasis occurs when:", choices: ["Two genes show codominance", "One gene masks or modifies the expression of a different gene at another locus", "All four alleles in a dihybrid are expressed equally", "Genes are located on sex chromosomes"], ans: 1, exp: "Epistasis occurs when the phenotypic expression of one gene is dependent on or modified by another gene at a different locus. For example, coat color in Labrador retrievers involves epistatic interaction between two genes." },
                    { q: "Pleiotropy refers to a gene that:", choices: ["Has more than two alleles", "Affects multiple phenotypic traits", "Is located on a sex chromosome", "Is only expressed in one tissue"], ans: 1, exp: "Pleiotropy is the phenomenon where a single gene influences multiple distinct phenotypic traits. For example, the sickle-cell allele affects red blood cell shape and causes widespread effects: anemia, pain crises, organ damage." },
                    { q: "Multiple alleles means:", choices: ["An individual has more than two alleles for a gene", "A gene has more than two possible alleles in a population (though each individual carries only two)", "Multiple genes control one trait", "All alleles are codominant"], ans: 1, exp: "Multiple alleles refers to the existence of more than two allelic forms of a gene in a population. ABO blood type is a classic example: three alleles (IA, IB, i) exist in the population, though each person has only two." },
                    { q: "Polygenic inheritance involves:", choices: ["One gene with multiple alleles", "Multiple genes each contributing to a single continuous phenotypic trait", "A gene that affects multiple traits", "Genes on multiple chromosomes that don't interact"], ans: 1, exp: "Polygenic inheritance occurs when two or more genes each contribute to a single quantitative trait (like height, skin color, or IQ), producing a continuous range of phenotypes rather than discrete categories." },
                    // GENOTYPE-PHENOTYPE (36-60)
                    { q: "A homozygous organism has:", choices: ["Two different alleles for a gene", "Two identical alleles for a gene", "One allele on each chromosome pair", "No alleles for a gene"], ans: 1, exp: "A homozygous individual has two identical alleles for a particular gene (e.g., AA or aa). These individuals breed true for that trait when self-fertilized or crossed with an identical homozygote." },
                    { q: "A heterozygous organism has:", choices: ["Two identical alleles", "Two different alleles for a gene (e.g., Aa)", "Only one chromosome", "No alleles"], ans: 1, exp: "A heterozygous individual carries two different alleles for a gene (one from each parent), such as Aa. The dominant allele determines the phenotype in simple dominance." },
                    { q: "The phenotype of an organism is:", choices: ["Its genetic makeup", "The observable physical expression of its genes", "Only its DNA sequence", "Determined solely by environment"], ans: 1, exp: "The phenotype is the observable, physical expression of an organism's genotype — including morphological, physiological, and behavioral characteristics. It results from interaction between genotype and environment." },
                    { q: "An organism's genotype refers to:", choices: ["Its observable characteristics", "The complete genetic makeup (allele combinations) of the organism", "Only its dominant alleles", "The protein products of genes"], ans: 1, exp: "Genotype is the complete genetic constitution of an organism — specifically the combination of alleles at one or more loci. It determines potential phenotype, which is then shaped by environmental interactions." },
                    { q: "Which of the following genotypes represents a homozygous dominant individual?", choices: ["Aa", "aA", "AA", "aa"], ans: 2, exp: "AA represents a homozygous dominant individual — both alleles at the locus are the dominant allele (A). This individual will display the dominant phenotype and can only pass on the A allele to offspring." },
                    { q: "Huntington's disease is caused by:", choices: ["A recessive autosomal allele", "A dominant autosomal allele — even one copy causes disease", "An X-linked recessive allele", "A chromosomal deletion"], ans: 1, exp: "Huntington's disease is caused by a single dominant allele (autosomal dominant inheritance). Even heterozygotes develop the disease. It results from a CAG trinucleotide repeat expansion in the HTT gene on chromosome 4." },
                    { q: "Cystic fibrosis is an example of:", choices: ["Autosomal dominant inheritance", "X-linked dominant inheritance", "Autosomal recessive inheritance", "Y-linked inheritance"], ans: 2, exp: "Cystic fibrosis is an autosomal recessive disorder — two copies of the mutated CFTR gene are required to develop the disease. Carriers (Aa) are phenotypically normal but can pass the allele to offspring." },
                    { q: "Phenylketonuria (PKU) results from the inability to:", choices: ["Produce insulin", "Metabolize the amino acid phenylalanine due to enzyme deficiency", "Absorb calcium", "Synthesize collagen"], ans: 1, exp: "PKU is an autosomal recessive disorder caused by mutations in the PAH gene, resulting in deficiency of phenylalanine hydroxylase. Without this enzyme, phenylalanine accumulates to toxic levels, causing intellectual disability if untreated." },
                    { q: "Environmental factors can influence phenotype. Which best illustrates this?", choices: ["Blood type is fixed by genotype regardless of environment", "Identical twins having slightly different heights due to nutritional differences during growth", "Skin color has no environmental component", "Eye color changes with nutrition"], ans: 1, exp: "Phenotype = genotype + environment. Identical twins share the same genotype but may differ in height due to differences in nutrition, exercise, or illness — demonstrating that environment modifies phenotypic expression." },
                    { q: "In ABO blood typing, which blood type is the universal donor?", choices: ["Type AB", "Type A", "Type B", "Type O"], ans: 3, exp: "Type O blood has neither A nor B antigens on red blood cells, so it cannot trigger an immune response in A, B, or AB recipients. Type O negative is the true universal donor (also lacking the Rh antigen)." },
                    { q: "Which karyotypic condition results in Down syndrome?", choices: ["Monosomy X", "Trisomy 21 (three copies of chromosome 21)", "Deletion of chromosome 5", "XXY genotype"], ans: 1, exp: "Down syndrome (trisomy 21) results from having three copies of chromosome 21 instead of the normal two, usually due to nondisjunction during meiosis. It is the most common chromosomal disorder." },
                    { q: "Turner syndrome (45,X) occurs in females who:", choices: ["Have an extra X chromosome", "Have only one X chromosome and no second sex chromosome", "Have three X chromosomes", "Have an XXY genotype"], ans: 1, exp: "Turner syndrome affects females with a 45,X karyotype — one X chromosome and no second sex chromosome (no Y and only one X). Features include short stature, gonadal dysgenesis, and fertility issues." },
                    { q: "Klinefelter syndrome (47,XXY) affects:", choices: ["Females with three X chromosomes", "Males with an extra X chromosome (XXY)", "Females with only one X", "Males with an extra Y chromosome"], ans: 1, exp: "Klinefelter syndrome (47,XXY) occurs in males who have an extra X chromosome. Features include tall stature, small testes, infertility, and sometimes mild learning differences. It is the most common sex chromosome aneuploidy." },
                    { q: "Nondisjunction during meiosis results in:", choices: ["Cells with the correct chromosome number", "Gametes with abnormal chromosome numbers (aneuploidy)", "Perfect genetic diversity", "Increased recombination"], ans: 1, exp: "Nondisjunction occurs when homologous chromosomes or sister chromatids fail to separate properly during meiosis, producing gametes with too many or too few chromosomes. Fertilization with such gametes leads to aneuploidy (e.g., trisomy)." },
                    { q: "Which statement best describes the relationship between genotype and phenotype?", choices: ["Phenotype determines genotype", "Genotype directly determines all phenotypic traits regardless of environment", "Genotype sets a range of possible phenotypes; environment determines expression within that range", "Phenotype and genotype are completely independent"], ans: 2, exp: "The 'norm of reaction' concept: genotype determines the range of possible phenotypes (reaction norm), while the specific environment an organism experiences determines which phenotype is actually expressed within that range." },
                    { q: "A pedigree is used in genetics to:", choices: ["Map genes to chromosomes", "Trace the inheritance pattern of a trait through generations of a family", "Sequence DNA", "Determine protein structure"], ans: 1, exp: "Pedigrees are diagrams that track the appearance of a trait across multiple generations of a family, using standardized symbols for males, females, affected/unaffected individuals, and mating lines. They help determine inheritance patterns (dominant/recessive, sex-linked, etc.)." },
                ]
            },
            {
                id: 'u4', label: 'Unit 4', color: 'var(--unit4)',
                title: "Life Always Finds a Way",
                desc: "Earth's history, evolution as a unifying theme, evidence, natural selection, and mechanisms of evolution",
                questions: [
                    // HISTORY OF LIFE & EVOLUTION (1-20)
                    { q: "The age of Earth is estimated to be approximately:", choices: ["6,000 years", "65 million years", "4.6 billion years", "13.8 billion years"], ans: 2, exp: "Earth is estimated to be approximately 4.6 billion years old, based on radiometric dating of meteorites, lunar rocks, and the oldest Earth minerals. Life (microbial) appeared around 3.5–3.8 billion years ago." },
                    { q: "The earliest forms of life on Earth were:", choices: ["Multicellular eukaryotes", "Prokaryotic microorganisms (bacteria-like cells)", "Simple plants", "Fish"], ans: 1, exp: "The earliest life forms were prokaryotes — simple cells without a membrane-bound nucleus. Fossilized stromatolites provide evidence of microbial life dating to approximately 3.5 billion years ago." },
                    { q: "The Great Oxidation Event (~2.4 billion years ago) refers to:", choices: ["A mass extinction by meteorite impact", "The accumulation of oxygen in Earth's atmosphere from photosynthetic cyanobacteria", "The formation of the ozone layer", "The origin of sexual reproduction"], ans: 1, exp: "Cyanobacteria evolved oxygenic photosynthesis and began producing oxygen as a byproduct ~2.7 billion years ago. By ~2.4 billion years ago, oxygen accumulated in the atmosphere, fundamentally changing Earth's chemistry." },
                    { q: "The Cambrian Explosion (~541 million years ago) refers to:", choices: ["The first mass extinction event", "The rapid diversification and appearance of most major animal phyla in the fossil record", "The origin of life on Earth", "The emergence of the first land plants"], ans: 1, exp: "The Cambrian Explosion was a relatively rapid diversification event during which most major animal body plans (phyla) appeared in the fossil record over ~20–25 million years, driven by ecological opportunities and possibly environmental changes." },
